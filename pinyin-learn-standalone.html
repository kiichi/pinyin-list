    function pinyinToKatakana(pinyinTextValue) {
      if (!pinyinTextValue) return '';

      const normalized = pinyinTextValue
        .toLowerCase()
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .replace(/u:/g, 'v')
        .replace(/ü/g, 'v')
        .replace(/[^a-zv\s]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();

      if (!normalized) return '';
      const converter =
        (window.wanakana && typeof window.wanakana.toKatakana === 'function' && window.wanakana) ||
        (window.Wanakana && typeof window.Wanakana.toKatakana === 'function' && window.Wanakana) ||
        (window.WanaKana && typeof window.WanaKana.toKatakana === 'function' && window.WanaKana) ||
        (window.wanakana && window.wanakana.default && typeof window.wanakana.default.toKatakana === 'function' && window.wanakana.default);

      const tokens = normalized.split(' ').filter(Boolean);
      return tokens
        .map(token => {
          if (KATAKANA_TUNING[token]) return KATAKANA_TUNING[token];
          if (PINYIN_KATAKANA_MAP[token]) return PINYIN_KATAKANA_MAP[token];
          return toKatakanaSafe(token, converter);
        })
        .join(' ');
    }

    function buildPinyinKatakanaMap() {
      const map = {};
      for (const row of PINYIN_TABLE_ROWS) {
        const tokens = row.split(/\s+/).filter(Boolean);
        for (let i = 0; i < tokens.length - 1; i += 1) {
          const roma = tokens[i];
          const kata = tokens[i + 1];
          if (!/^[a-zv:ü]+$/.test(roma)) continue;
          if (!/[ァ-ヶー]/.test(kata)) continue;

          const key = roma.replace(/u:/g, 'v').replace(/ü/g, 'v');
          const value = kata.split(',')[0];
          if (!map[key]) {
            map[key] = value;
          }
        }
      }
      return map;
    }

    function toKatakanaSafe(token, converter) {
      let converted = '';
      if (converter) {
        converted = converter.toKatakana(token);
      }
      if (!converted || /[A-Za-z]/.test(converted)) {
        converted = romanToKatakanaFallback(token);
      }
      return converted || token;
    }

    function romanToKatakanaFallback(token) {
      const map = {
        kya: 'キャ', kyu: 'キュ', kyo: 'キョ',
        gya: 'ギャ', gyu: 'ギュ', gyo: 'ギョ',
        sha: 'シャ', shu: 'シュ', sho: 'ショ',
        ja: 'ジャ', ju: 'ジュ', jo: 'ジョ',
        cha: 'チャ', chu: 'チュ', cho: 'チョ',
        nya: 'ニャ', nyu: 'ニュ', nyo: 'ニョ',
        hya: 'ヒャ', hyu: 'ヒュ', hyo: 'ヒョ',
        bya: 'ビャ', byu: 'ビュ', byo: 'ビョ',
        pya: 'ピャ', pyu: 'ピュ', pyo: 'ピョ',
        mya: 'ミャ', myu: 'ミュ', myo: 'ミョ',
        rya: 'リャ', ryu: 'リュ', ryo: 'リョ',
        tsu: 'ツ', shi: 'シ', chi: 'チ', fu: 'フ',
        ka: 'カ', ki: 'キ', ku: 'ク', ke: 'ケ', ko: 'コ',
        ga: 'ガ', gi: 'ギ', gu: 'グ', ge: 'ゲ', go: 'ゴ',
        sa: 'サ', su: 'ス', se: 'セ', so: 'ソ',
        za: 'ザ', ji: 'ジ', zu: 'ズ', ze: 'ゼ', zo: 'ゾ',
        ta: 'タ', te: 'テ', to: 'ト',
        da: 'ダ', de: 'デ', do: 'ド',
        na: 'ナ', ni: 'ニ', nu: 'ヌ', ne: 'ネ', no: 'ノ',
        ha: 'ハ', hi: 'ヒ', he: 'ヘ', ho: 'ホ',
        ba: 'バ', bi: 'ビ', bu: 'ブ', be: 'ベ', bo: 'ボ',
        pa: 'パ', pi: 'ピ', pu: 'プ', pe: 'ペ', po: 'ポ',
        ma: 'マ', mi: 'ミ', mu: 'ム', me: 'メ', mo: 'モ',
        ya: 'ヤ', yu: 'ユ', yo: 'ヨ',
        ra: 'ラ', ri: 'リ', ru: 'ル', re: 'レ', ro: 'ロ',
        wa: 'ワ', wo: 'ヲ',
        a: 'ア', i: 'イ', u: 'ウ', e: 'エ', o: 'オ',
        n: 'ン'
      };

      let s = token.toLowerCase();
      let out = '';
      while (s.length > 0) {
        const c3 = s.slice(0, 3);
        const c2 = s.slice(0, 2);
        const c1 = s.slice(0, 1);
        if (map[c3]) {
          out += map[c3];
          s = s.slice(3);
          continue;
        }
        if (map[c2]) {
          out += map[c2];
          s = s.slice(2);
          continue;
        }
        if (map[c1]) {
          out += map[c1];
          s = s.slice(1);
          continue;
        }
        s = s.slice(1);
      }
      return out;
    }

    function buildUtterance(text, lang) {
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.lang = lang || 'zh-CN';
      utterance.rate = 0.8;
      utterance.pitch = 1;

      const voices = window.speechSynthesis.getVoices();
      const preferZh = ['xiaoxiao', 'tingting', 'yunxi', 'google', 'microsoft'];
      const preferJa = ['nanami', 'keita', 'google', 'microsoft', 'kyoko', 'otoya'];
      const langLower = (lang || '').toLowerCase();
      const voicePrefix = langLower.startsWith('ja') ? 'ja' : (langLower.startsWith('ko') ? 'ko' : 'zh');
      const preferred = voicePrefix === 'ja' ? preferJa : preferZh;
      const candidates = voices.filter(v => v.lang.toLowerCase().startsWith(voicePrefix));
      const picked = candidates.find(v =>
        preferred.some(p => v.name.toLowerCase().includes(p))
      ) || candidates[0];
      if (picked) utterance.voice = picked;
      return utterance;
    }

    function stopPlayAll() {
      playAllRunId += 1;
      if (isPlayAllActive) {
        isPlayAllActive = false;
        updateTabsMenuState();
      }
      flashCardHideAnswer = false;
      setPlayAllProgress(0, playAllProgressTotal);
    }

    function setPlayAllProgress(current, total) {
      if (!playAllProgress || !playAllProgressText || !playAllProgressFill) return;
      const safeTotal = Math.max(0, Number(total) || 0);
      const safeCurrent = Math.max(0, Math.min(Number(current) || 0, safeTotal));
      playAllProgressCurrent = safeCurrent;
      playAllProgressTotal = safeTotal;
      playAllProgressText.textContent = `${safeCurrent} / ${safeTotal}`;
      const percent = safeTotal > 0 ? Math.round((safeCurrent / safeTotal) * 100) : 0;
      playAllProgressFill.style.width = `${percent}%`;
      const track = playAllProgressFill.parentElement;
      if (track) {
        track.setAttribute('aria-valuenow', String(percent));
      }
    }

    function buildPlayAllQueue(activeTab) {
      if (!activeTab) return [];
      const items = getTabItems(activeTab);
      return items
        .map((item) => ({
          id: item.id,
          text: (item.target || item.zh || '').trim(),
          lang: item.speakLang || (item.mode === 'ja' || item.mode === 'ja_ko' ? 'ja-JP' : (item.mode === 'ko' ? 'ko-KR' : 'zh-CN')),
          sourceText: (item.source || '').trim(),
          sourceLang: inferSourceSpeakLang(item)
        }))
        .filter(entry => Boolean(entry.text));
    }

    function getPlayAllRepeatCount() {
      const raw = playAllRepeatSelect ? Number(playAllRepeatSelect.value) : 1;
      if (!Number.isFinite(raw)) return 1;
      return Math.max(1, Math.min(3, Math.floor(raw)));
    }

    function getPlayAllIntervalMs() {
      const raw = playAllIntervalSelect ? Number(playAllIntervalSelect.value) : 1500;
      if (!Number.isFinite(raw)) return 1500;
      if (raw <= 1000) return 1000;
      if (raw >= 2000) return 2000;
      return 1500;
    }

    function shouldReadSourceDuringPlayAll() {
      return Boolean(playAllReadSourceCheckbox && playAllReadSourceCheckbox.checked);
    }

    function inferSourceSpeakLang(item) {
      const value = String((item && item.source) || '');
      if (/[ㄱ-ㅎㅏ-ㅣ가-힣]/.test(value)) return 'ko-KR';
      if (/[\u3040-\u30ff]/.test(value)) return 'ja-JP';
      if (/[A-Za-z]/.test(value)) return 'en-US';
      const mode = item && item.mode;
      if (mode === 'ja_ko') return 'ko-KR';
      if (mode === 'ja') return 'zh-CN';
      if (mode === 'ko' || mode === 'zh') return 'ja-JP';
      if (/[\u4E00-\u9FFF]/.test(value)) return 'zh-CN';
      return 'en-US';
    }

    function startPlayAllWithMode(mode = 'beginning') {
      const startMode = normalizePlayAllStartMode(mode);
      if (isPlayAllActive) {
        stopPlayAll();
        window.speechSynthesis.cancel();
        setNowPlayingSavedId(null);
      }
      playAllSavedItems(startMode);
    }

    function togglePlayAllPlayback() {
      if (isPlayAllActive) {
        stopPlayAll();
        window.speechSynthesis.cancel();
        setNowPlayingSavedId(null);
        return;
      }
      playAllSavedItems(playAllMainMode);
    }

    function scrollSavedItemIntoView(itemId) {
      if (!itemId) return;
      const rows = savedList.querySelectorAll('.saved-item');
      let targetRow = null;
      for (const row of rows) {
        if (row instanceof HTMLElement && row.dataset.id === itemId) {
          targetRow = row;
          break;
        }
      }
      if (!targetRow) return;
      const prefersReducedMotion = window.matchMedia
        && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      targetRow.scrollIntoView({
        block: 'nearest',
        inline: 'nearest',
        behavior: prefersReducedMotion ? 'auto' : 'smooth'
      });
    }

    function setNowPlayingSavedId(itemId) {
      const nextId = itemId || null;
      if (nowPlayingSavedId === nextId) return;
      nowPlayingSavedId = nextId;
      if (nextId && isFlashCardMode) {
        flashCardCurrentId = nextId;
      }
      renderSavedItems();
      updateFlashCardNavButtons();
      if (nextId && !isFlashCardMode) {
        requestAnimationFrame(() => scrollSavedItemIntoView(nextId));
      }
    }

    function speakText(text, lang) {
      if (!text) return;
      stopPlayAll();
      setNowPlayingSavedId(null);
      const utterance = buildUtterance(text, lang);
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    function playAllSavedItems(startMode = 'beginning') {
      const activeTab = getActiveTab();
      if (!activeTab) return;
      const baseQueue = buildPlayAllQueue(activeTab);
      if (baseQueue.length === 0) return;
      let queue = baseQueue;
      const mode = normalizePlayAllStartMode(startMode);
      let progressOffset = 0;
      let progressTotal = baseQueue.length;
      if (mode === 'current') {
        const anchorId = getCurrentPlayAnchorId();
        const anchorIndex = anchorId ? queue.findIndex(entry => entry.id === anchorId) : -1;
        if (anchorIndex >= 0) {
          progressOffset = anchorIndex;
          queue = queue.slice(anchorIndex);
        }
      } else if (mode === 'random') {
        queue = shuffleArray(queue);
      }
      const repeatEach = getPlayAllRepeatCount();
      const intervalMs = getPlayAllIntervalMs();
      const readSourceToo = shouldReadSourceDuringPlayAll();

      const runId = playAllRunId + 1;
      playAllRunId = runId;
      if (!isPlayAllActive) {
        isPlayAllActive = true;
        updateTabsMenuState();
      }
      setPlayAllProgress(progressOffset, progressTotal);
      window.speechSynthesis.cancel();
      speakQueue(queue, 0, runId, repeatEach, 1, intervalMs, readSourceToo, 'translated', progressOffset, progressTotal);
    }

    function speakQueue(queue, index, runId, repeatEach, repeatIndex, intervalMs, readSourceToo, phase, progressOffset = 0, progressTotal = queue.length) {
      if (runId !== playAllRunId) {
        setNowPlayingSavedId(null);
        flashCardHideAnswer = false;
        setPlayAllProgress(0, progressTotal);
        return;
      }
      if (index >= queue.length) {
        setNowPlayingSavedId(null);
        stopPlayAll();
        return;
      }

      const entry = queue[index];
      const isSourcePhase = phase === 'source' && readSourceToo && Boolean(entry.sourceText);
      const speakTextValue = isSourcePhase ? entry.sourceText : entry.text;
      const speakLangValue = isSourcePhase ? entry.sourceLang : entry.lang;
      const isFirstTranslatedRead = !isSourcePhase && repeatIndex === 1;
      flashCardHideAnswer = isFlashCardMode && isFirstTranslatedRead;
      setPlayAllProgress(progressOffset + index + 1, progressTotal);
      setNowPlayingSavedId(entry.id);
      const utterance = buildUtterance(speakTextValue, speakLangValue);
      utterance.onend = () => {
        setTimeout(() => {
          if (flashCardHideAnswer) {
            flashCardHideAnswer = false;
            if (isFlashCardMode) {
              renderSavedItems();
            }
          }
          const shouldPlaySourceAfterFirstTranslated = !isSourcePhase
            && readSourceToo
            && Boolean(entry.sourceText)
            && repeatIndex === 1;
          if (shouldPlaySourceAfterFirstTranslated) {
            speakQueue(queue, index, runId, repeatEach, repeatIndex, intervalMs, readSourceToo, 'source', progressOffset, progressTotal);
            return;
          }
          if (repeatIndex < repeatEach) {
            speakQueue(queue, index, runId, repeatEach, repeatIndex + 1, intervalMs, readSourceToo, 'translated', progressOffset, progressTotal);
            return;
          }
          speakQueue(queue, index + 1, runId, repeatEach, 1, intervalMs, readSourceToo, 'translated', progressOffset, progressTotal);
        }, intervalMs);
      };
      utterance.onerror = () => {
        setTimeout(() => {
          if (flashCardHideAnswer) {
            flashCardHideAnswer = false;
            if (isFlashCardMode) {
              renderSavedItems();
            }
          }
          const shouldPlaySourceAfterFirstTranslated = !isSourcePhase
            && readSourceToo
            && Boolean(entry.sourceText)
            && repeatIndex === 1;
          if (shouldPlaySourceAfterFirstTranslated) {
            speakQueue(queue, index, runId, repeatEach, repeatIndex, intervalMs, readSourceToo, 'source', progressOffset, progressTotal);
            return;
          }
          if (repeatIndex < repeatEach) {
            speakQueue(queue, index, runId, repeatEach, repeatIndex + 1, intervalMs, readSourceToo, 'translated', progressOffset, progressTotal);
            return;
          }
          speakQueue(queue, index + 1, runId, repeatEach, 1, intervalMs, readSourceToo, 'translated', progressOffset, progressTotal);
        }, intervalMs);
      };
      window.speechSynthesis.speak(utterance);
    }

    function playSavedItem(item) {
      const text = (item.target || item.zh || '').trim();
      if (!text) return;
      stopPlayAll();
      setNowPlayingSavedId(item.id);
      const lang = item.speakLang || (item.mode === 'ja' || item.mode === 'ja_ko' ? 'ja-JP' : (item.mode === 'ko' ? 'ko-KR' : 'zh-CN'));
      const utterance = buildUtterance(text, lang);
      utterance.onend = () => setNowPlayingSavedId(null);
      utterance.onerror = () => setNowPlayingSavedId(null);
      window.speechSynthesis.cancel();
      window.speechSynthesis.speak(utterance);
    }

    function applyModeToUi() {
      modeSelect.value = appMode;
      kanaLabel.textContent = 'Katakana';
      if (appMode === 'ja') {
        if (subtitleText) subtitleText.textContent = 'Input Chinese or English. Get Japanese + Hiragana + Romaji + audio.';
        inputLabel.textContent = 'Input Word';
        targetLabel.textContent = 'Japanese';
        readingLabel.textContent = 'Hiragana';
        kanaLabel.textContent = 'Romaji';
        sourceText.placeholder = 'Type Chinese or English...';
        if (speakBtn.parentElement !== kanaInline) {
          kanaInline.appendChild(speakBtn);
        }
      } else if (appMode === 'ko') {
        if (subtitleText) subtitleText.textContent = 'Input Japanese or English. Get Korean + romanization + audio.';
        inputLabel.textContent = 'Input Word';
        targetLabel.textContent = 'Korean';
        readingLabel.textContent = 'Romanization';
        kanaLabel.textContent = '-';
        sourceText.placeholder = 'Type Japanese or English...';
        if (speakBtn.parentElement !== readingInline) {
          readingInline.appendChild(speakBtn);
        }
      } else if (appMode === 'ja_ko') {
        if (subtitleText) subtitleText.textContent = 'Input Korean or English. Get Japanese + Hiragana + Romaji + audio.';
        inputLabel.textContent = 'Input Word';
        targetLabel.textContent = 'Japanese';
        readingLabel.textContent = 'Hiragana';
        kanaLabel.textContent = 'Romaji';
        sourceText.placeholder = 'Type Korean or English...';
        if (speakBtn.parentElement !== kanaInline) {
          kanaInline.appendChild(speakBtn);
        }
      } else {
        if (subtitleText) subtitleText.textContent = 'Input Japanese or English. Get Chinese + pinyin + katakana + audio.';
        inputLabel.textContent = 'Input Word';
        targetLabel.textContent = 'Chinese';
        readingLabel.textContent = 'Pinyin';
        kanaLabel.textContent = 'Katakana';
        sourceText.placeholder = 'Type English or Japanese...';
        if (speakBtn.parentElement !== readingInline) {
          readingInline.appendChild(speakBtn);
        }
      }
    }

    function loadAppMode() {
      const raw = localStorage.getItem(MODE_KEY);
      return MODE_KEYS.includes(raw) ? raw : 'zh';
    }

    function persistAppMode(mode) {
      localStorage.setItem(MODE_KEY, MODE_KEYS.includes(mode) ? mode : 'zh');
    }

    function showBusy(isBusy) {
      if (isBusy) {
        showError('Looking up...');
        return;
      }
      if (errorBox.textContent === 'Looking up...') {
        showError('');
      }
    }

    function showError(message) {
      errorBox.textContent = message || '';
    }

    function hasWanakanaConverter() {
      return Boolean(
        (window.wanakana && typeof window.wanakana.toKatakana === 'function') ||
        (window.Wanakana && typeof window.Wanakana.toKatakana === 'function') ||
        (window.WanaKana && typeof window.WanaKana.toKatakana === 'function') ||
        (window.wanakana && window.wanakana.default && typeof window.wanakana.default.toKatakana === 'function')
      );
    }

    async function ensureWanakanaLoaded() {
      // Do not dynamically load script to avoid ORB/CSP issues.
      // If wanakana is unavailable, app uses built-in safe fallbacks.
      return;
    }


    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.async = true;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    }

    async function fetchWithTimeout(url, timeoutMs) {
      const controller = new AbortController();
      const timer = setTimeout(() => controller.abort(), timeoutMs);
      try {
        return await fetch(url, { signal: controller.signal });
      } finally {
        clearTimeout(timer);
      }
    }

    function switchTab(tabId) {
      const modeState = getModeState();
      if (!modeState) return;
      if (!modeState.tabs.some(tab => tab.id === tabId)) return;
      modeState.activeTabId = tabId;
      selectedSavedIds.clear();
      persistAppState();
      renderTabs();
      renderSavedItems();
    }

    function startTabRename(tabId) {
      editingTabId = tabId;
      renderTabs();
    }

    function commitTabRename(tabId, nextName) {
      const modeState = getModeState();
      if (!modeState) return;
      const tab = modeState.tabs.find(t => t.id === tabId);
      if (!tab) return;
      const trimmed = String(nextName || '').trim();
      editingTabId = null;
      if (!trimmed) {
        renderTabs();
        return;
      }
      tab.name = trimmed;
      persistAppState();
      renderTabs();
    }

    function cancelTabRename() {
      editingTabId = null;
      renderTabs();
    }

    function deleteTab(tabId) {
      const modeState = getModeState();
      if (!modeState) return;
      const target = modeState.tabs.find(tab => tab.id === tabId);
      if (!target) return;
      const ok = window.confirm(`Delete tab "${target.name}"?`);
      if (!ok) return;

      modeState.tabs = modeState.tabs.filter(tab => tab.id !== tabId);
      if (modeState.tabs.length === 0) {
        modeState.tabs.push(createTab('List 1'));
      }
      if (!modeState.tabs.some(tab => tab.id === modeState.activeTabId)) {
        modeState.activeTabId = modeState.tabs[0].id;
      }

      selectedSavedIds.clear();
      persistAppState();
      renderTabs();
      renderSavedItems();
    }

    function cloneTabWithFreshIds(tab, nextName) {
      const copy = {
        id: generateItemId(),
        name: nextName,
        itemsByMode: { zh: [], ja: [], ko: [], ja_ko: [] }
      };
      for (const modeKey of MODE_KEYS) {
        const items = getTabItems(tab, modeKey);
        copy.itemsByMode[modeKey] = items.map(item => ({
          ...item,
          id: generateItemId(),
          createdAt: item.createdAt || new Date().toISOString()
        }));
      }
      return copy;
    }

    function duplicateTab(tabId) {
      const modeState = getModeState();
      if (!modeState) return;
      const sourceIndex = modeState.tabs.findIndex(tab => tab.id === tabId);
      if (sourceIndex === -1) return;
      const sourceTab = modeState.tabs[sourceIndex];
      const nextName = makeUniqueTabName(`${sourceTab.name} Copy`);
      const duplicated = cloneTabWithFreshIds(sourceTab, nextName);
      modeState.tabs.splice(sourceIndex + 1, 0, duplicated);
      modeState.activeTabId = duplicated.id;
      selectedSavedIds.clear();
      lastSelectedSavedId = null;
      editingTabId = null;
      persistAppState();
      renderTabs();
      renderSavedItems();
      showError(`Duplicated tab "${sourceTab.name}".`);
    }

    function renderTabs() {
      const modeState = getModeState();
      tabsList.innerHTML = '';
      if (!modeState) return;
      const activeTab = getActiveTab();
      const activeItems = activeTab ? getTabItems(activeTab) : [];
      const selectedCount = activeItems.filter(item => selectedSavedIds.has(item.id)).length;
      for (const tab of modeState.tabs) {
        const item = document.createElement('div');
        item.className = `tab-item${tab.id === modeState.activeTabId ? ' active' : ''}`;
        item.dataset.tabId = tab.id;
        item.draggable = editingTabId !== tab.id;
        item.addEventListener('dragstart', (event) => {
          if (editingTabId === tab.id) return;
          draggedTabId = tab.id;
          item.classList.add('is-dragging');
          if (event.dataTransfer) {
            event.dataTransfer.effectAllowed = 'move';
            event.dataTransfer.setData('text/plain', tab.id);
          }
        });
        item.addEventListener('dragend', () => {
          draggedTabId = null;
          item.classList.remove('is-dragging');
          clearTabDropHighlights();
        });
        item.addEventListener('dragover', (event) => {
          if (draggedSavedItemId) {
            event.preventDefault();
            item.classList.add('drag-over-target');
            return;
          }
          if (draggedTabId && draggedTabId !== tab.id) {
            event.preventDefault();
            item.classList.add('drag-over-reorder');
            item.classList.remove('drag-insert-left', 'drag-insert-right');
            const rect = item.getBoundingClientRect();
            const insertAfter = event.clientX > rect.left + rect.width / 2;
            item.classList.add(insertAfter ? 'drag-insert-right' : 'drag-insert-left');
          }
        });
        item.addEventListener('dragleave', () => {
          item.classList.remove('drag-over-target');
          item.classList.remove('drag-over-reorder', 'drag-insert-left', 'drag-insert-right');
        });
        item.addEventListener('drop', (event) => {
          if (draggedSavedItemId) {
            event.preventDefault();
            item.classList.remove('drag-over-target');
            moveDraggedItemToTab(tab.id);
            return;
          }
          if (draggedTabId && draggedTabId !== tab.id) {
            event.preventDefault();
            const insertAfter = item.classList.contains('drag-insert-right');
            item.classList.remove('drag-over-reorder', 'drag-insert-left', 'drag-insert-right');
            reorderTabs(draggedTabId, tab.id, insertAfter);
          }
        });

    if (editingTabId === tab.id) {
      const editInput = document.createElement('input');
          editInput.className = 'tab-name-input';
          editInput.type = 'text';
          editInput.value = tab.name;
          editInput.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
              event.preventDefault();
              commitTabRename(tab.id, editInput.value);
            } else if (event.key === 'Escape') {
              event.preventDefault();
              cancelTabRename();
            }
          });
          editInput.addEventListener('blur', () => {
            commitTabRename(tab.id, editInput.value);
          });
          item.appendChild(editInput);
          setTimeout(() => {
            editInput.focus();
            editInput.select();
          }, 0);
    } else {
          const tabBtn = document.createElement('button');
          tabBtn.className = 'tab-btn';
          tabBtn.textContent = `${tab.name} (${getTabItems(tab).length})`;
          tabBtn.addEventListener('click', () => switchTab(tab.id));
          tabBtn.addEventListener('dblclick', () => startTabRename(tab.id));
          item.appendChild(tabBtn);

          const segWrap = document.createElement('div');
          segWrap.className = 'tab-seg-wrap';
          const segBtn = document.createElement('button');
          segBtn.className = 'tab-seg-btn';
          segBtn.type = 'button';
          segBtn.textContent = '▾';
          segBtn.setAttribute('aria-label', `Tab actions for ${tab.name}`);
          segBtn.setAttribute('aria-expanded', 'false');
          const segMenu = document.createElement('div');
          segMenu.className = 'tab-seg-menu';
          segMenu.hidden = true;

          segBtn.addEventListener('click', (event) => {
            event.stopPropagation();
            toggleTabActionMenu(tab.id, segMenu, segBtn, () => {
              renderTabActionMenu(tab, segMenu);
            });
          });
          segWrap.appendChild(segBtn);
          segWrap.appendChild(segMenu);
          item.appendChild(segWrap);
        }
        tabsList.appendChild(item);
      }

      const addBtn = document.createElement('button');
      addBtn.className = 'tab-add-btn';
      addBtn.textContent = '+';
      addBtn.title = 'New tab';
      addBtn.addEventListener('click', () => {
        const newTab = createTab(`List ${modeState.tabs.length + 1}`);
        modeState.tabs.push(newTab);
        modeState.activeTabId = newTab.id;
        editingTabId = newTab.id;
        selectedSavedIds.clear();
        persistAppState();
        renderTabs();
        renderSavedItems();
      });
      tabsList.appendChild(addBtn);
      updateTabsMenuState();
    }

    function updateTabsMenuState() {
      const modeState = getModeState();
      if (deleteTabBtn) {
        const canDeleteTab = Boolean(modeState && Array.isArray(modeState.tabs) && modeState.tabs.length > 1);
        deleteTabBtn.disabled = !canDeleteTab;
        deleteTabBtn.title = canDeleteTab ? '' : 'At least one tab is required';
      }
      if (deleteAllTabsBtn) {
        const hasTabs = Boolean(modeState && Array.isArray(modeState.tabs) && modeState.tabs.length > 0);
        deleteAllTabsBtn.disabled = !hasTabs;
        deleteAllTabsBtn.title = hasTabs ? '' : 'No tabs to delete';
      }
      if (playAllBtn) {
        const activeTab = getActiveTab();
        const queue = buildPlayAllQueue(activeTab);
        const hasPlayableItems = queue.length > 0;
        playAllBtn.textContent = isPlayAllActive ? 'Stop Playing' : 'Play All';
        playAllBtn.disabled = !hasPlayableItems && !isPlayAllActive;
        playAllBtn.title = isPlayAllActive
          ? 'Stop playing pronunciations'
          : (hasPlayableItems ? 'Play all saved pronunciations' : 'No items to play');
        if (!isPlayAllActive) {
          setPlayAllProgress(0, queue.length);
        }
      }
      if (playAllWidgetBtn) {
        const activeTab = getActiveTab();
        const queue = buildPlayAllQueue(activeTab);
        const hasPlayableItems = queue.length > 0;
        const modeLabel = getPlayAllModeLabel(playAllMainMode);
        playAllWidgetBtn.textContent = isPlayAllActive ? 'Stop' : modeLabel;
        playAllWidgetBtn.classList.toggle('is-playing', isPlayAllActive);
        playAllWidgetBtn.disabled = !hasPlayableItems && !isPlayAllActive;
        playAllWidgetBtn.title = isPlayAllActive
          ? 'Stop playing pronunciations'
          : (hasPlayableItems ? `${modeLabel} for saved pronunciations` : 'No items to play');
      }
      updateMoveToTriggerState();
      updateCopyToTriggerState();
      updateFlashCardNavButtons();
    }

    function clearTabDropHighlights() {
      const nodes = tabsList.querySelectorAll('.tab-item.drag-over-target, .tab-item.drag-over-reorder, .tab-item.drag-insert-left, .tab-item.drag-insert-right, .tab-item.is-dragging');
      nodes.forEach(node => node.classList.remove('drag-over-target', 'drag-over-reorder', 'drag-insert-left', 'drag-insert-right', 'is-dragging'));
    }

    function reorderTabs(sourceTabId, targetTabId, insertAfter) {
      const modeState = getModeState();
      if (!modeState) return;
      if (!sourceTabId || !targetTabId || sourceTabId === targetTabId) return;
      const sourceIndex = modeState.tabs.findIndex(tab => tab.id === sourceTabId);
      const targetIndex = modeState.tabs.findIndex(tab => tab.id === targetTabId);
      if (sourceIndex === -1 || targetIndex === -1) return;

      const tabs = [...modeState.tabs];
      const [moved] = tabs.splice(sourceIndex, 1);
      const nextTargetIndex = tabs.findIndex(tab => tab.id === targetTabId);
      if (nextTargetIndex === -1) return;
      const insertIndex = insertAfter ? nextTargetIndex + 1 : nextTargetIndex;
      tabs.splice(insertIndex, 0, moved);
      modeState.tabs = tabs;
      persistAppState();
      renderTabs();
    }

    function makeSavedItemKey(item) {
      return `${item.mode || 'zh'}__${item.source || ''}__${item.target || item.zh || ''}`;
    }

    function splitMovableItems(sourceItems, targetItems, movingSet) {
      const targetKeys = new Set(targetItems.map(makeSavedItemKey));
      const movable = [];
      const blocked = [];
      for (const item of sourceItems) {
        if (!movingSet.has(item.id)) continue;
        const key = makeSavedItemKey(item);
        if (targetKeys.has(key)) {
          blocked.push(item);
        } else {
          movable.push(item);
          targetKeys.add(key);
        }
      }
      return { movable, blocked };
    }

    function closeTabTransferSubmenus(menuEl) {
      if (!(menuEl instanceof HTMLElement)) return;
      const panels = menuEl.querySelectorAll('.tab-seg-submenu-panel');
      panels.forEach((panel) => {
        if (panel instanceof HTMLElement) panel.hidden = true;
      });
      const triggers = menuEl.querySelectorAll('.tab-seg-submenu-trigger[aria-expanded="true"]');
      triggers.forEach((trigger) => {
        if (trigger instanceof HTMLElement) trigger.setAttribute('aria-expanded', 'false');
      });
    }

    function buildTabTransferSubmenu(menuEl, labelText, actionType) {
      const modeState = getModeState();
      const activeTab = getActiveTab();
      const wrap = document.createElement('div');
      wrap.className = 'tabs-submenu-wrap';

      const trigger = document.createElement('button');
      trigger.className = 'tabs-menu-item tabs-submenu-trigger tab-seg-submenu-trigger';
      trigger.type = 'button';
      trigger.setAttribute('aria-haspopup', 'true');
      trigger.setAttribute('aria-expanded', 'false');
      const label = document.createElement('span');
      label.textContent = labelText;
      const arrow = document.createElement('span');
      arrow.className = 'tabs-submenu-arrow';
      arrow.setAttribute('aria-hidden', 'true');
      arrow.textContent = '▸';
      trigger.appendChild(label);
      trigger.appendChild(arrow);

      const panel = document.createElement('div');
      panel.className = 'tabs-submenu-panel tab-seg-submenu-panel';
      panel.hidden = true;

      if (!modeState || !activeTab) {
        const empty = document.createElement('div');
        empty.className = 'tabs-menu-muted';
        empty.textContent = 'No tabs available';
        panel.appendChild(empty);
        wrap.appendChild(trigger);
        wrap.appendChild(panel);
        return wrap;
      }

      const activeItems = getTabItems(activeTab);
      const selectedCount = activeItems.filter(item => selectedSavedIds.has(item.id)).length;
      const targets = modeState.tabs.filter(tab => tab.id !== activeTab.id);
      if (targets.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'tabs-menu-muted';
        empty.textContent = 'No other tabs';
        panel.appendChild(empty);
        wrap.appendChild(trigger);
        wrap.appendChild(panel);
        return wrap;
      }

      if (selectedCount === 0) {
        const hint = document.createElement('div');
        hint.className = 'tabs-menu-muted';
        hint.textContent = 'Select item(s) first';
        panel.appendChild(hint);
      }

      for (const target of targets) {
        const btn = document.createElement('button');
        btn.className = 'tabs-menu-item';
        btn.type = 'button';
        btn.textContent = `${target.name} (${getTabItems(target).length})`;
        btn.disabled = selectedCount === 0;
        btn.addEventListener('click', () => {
          if (actionType === 'move') {
            moveSelectedItemsToTab(target.id);
          } else {
            copySelectedItemsToTab(target.id);
          }
          closeAllTabActionMenus();
        });
        panel.appendChild(btn);
      }

      trigger.addEventListener('click', (event) => {
        event.stopPropagation();
        const willOpen = panel.hidden;
        closeTabTransferSubmenus(menuEl);
        if (!willOpen) return;
        panel.hidden = false;
        trigger.setAttribute('aria-expanded', 'true');
      });

      wrap.appendChild(trigger);
      wrap.appendChild(panel);
      return wrap;
    }

    function renderTabActionMenu(tab, menuEl) {
      if (!(menuEl instanceof HTMLElement)) return;
      const modeState = getModeState();
      menuEl.innerHTML = '';
      menuEl.appendChild(buildTabTransferSubmenu(menuEl, 'Move To', 'move'));
      menuEl.appendChild(buildTabTransferSubmenu(menuEl, 'Copy To', 'copy'));

      const transferSep = document.createElement('div');
      transferSep.className = 'tabs-menu-sep';
      menuEl.appendChild(transferSep);

      const delSelectedBtn = document.createElement('button');
      delSelectedBtn.className = 'tabs-menu-item danger';
      delSelectedBtn.type = 'button';
      delSelectedBtn.textContent = 'Delete Item(s)';
      delSelectedBtn.addEventListener('click', () => {
        if (selectedSavedIds.size === 0) {
          showError('Select items first.');
          return;
        }
        deleteSelectedItemsInActiveTab();
        closeAllTabActionMenus();
      });

      const clearBtn = document.createElement('button');
      clearBtn.className = 'tabs-menu-item danger';
      clearBtn.type = 'button';
      clearBtn.textContent = 'Clear All Items';
      clearBtn.addEventListener('click', () => {
        clearAllItemsInTab(tab.id);
        closeAllTabActionMenus();
      });

      const dupBtn = document.createElement('button');
      dupBtn.className = 'tabs-menu-item';
      dupBtn.type = 'button';
      dupBtn.textContent = 'Duplicate Tab';
      dupBtn.addEventListener('click', () => {
        closeAllTabActionMenus();
        duplicateTab(tab.id);
      });

      const delBtn = document.createElement('button');
      delBtn.className = 'tabs-menu-item danger';
      delBtn.type = 'button';
      delBtn.textContent = 'Delete This Tab';
      delBtn.disabled = !modeState || modeState.tabs.length <= 1;
      delBtn.addEventListener('click', () => {
        closeAllTabActionMenus();
        deleteTab(tab.id);
      });

      menuEl.appendChild(delSelectedBtn);
      menuEl.appendChild(clearBtn);
      menuEl.appendChild(dupBtn);
      menuEl.appendChild(delBtn);
    }

    function moveDraggedItemToTab(targetTabId) {
      if (!draggedFromTabId) return;
      if (targetTabId === draggedFromTabId) return;
      const modeState = getModeState();
      if (!modeState) return;

      const sourceTab = modeState.tabs.find(tab => tab.id === draggedFromTabId);
      const targetTab = modeState.tabs.find(tab => tab.id === targetTabId);
      if (!sourceTab || !targetTab) return;
      const sourceItems = getTabItems(sourceTab);
      const targetItems = getTabItems(targetTab);

      const movingIds = draggedSavedItemIds.length > 0
        ? draggedSavedItemIds
        : (draggedSavedItemId ? [draggedSavedItemId] : []);
      if (movingIds.length === 0) return;
      const movingSet = new Set(movingIds);
      const { movable, blocked } = splitMovableItems(sourceItems, targetItems, movingSet);
      if (movable.length === 0) {
        if (blocked.length > 0) {
          showError('Already exists in destination tab. Kept in original tab.');
        }
        return;
      }

      const movableSet = new Set(movable.map(item => item.id));
      setTabItems(sourceTab, sourceItems.filter(item => !movableSet.has(item.id)));
      setTabItems(targetTab, [...movable, ...targetItems]);
      selectedSavedIds.clear();
      lastSelectedSavedId = null;
      if (blocked.length > 0) {
        showError(`Moved ${movable.length}. Skipped ${blocked.length} duplicates.`);
      } else {
        showError(`Moved ${movable.length} item(s).`);
      }

      persistAppState();
      renderTabs();
      renderSavedItems();
    }

    function moveSelectedItemsToTab(targetTabId) {
      const modeState = getModeState();
      if (!modeState) return;
      const activeTab = getActiveTab();
      const targetTab = modeState.tabs.find(tab => tab.id === targetTabId);
      if (!activeTab || !targetTab) return;
      if (activeTab.id === targetTabId) return;
      const activeItems = getTabItems(activeTab);
      const targetItems = getTabItems(targetTab);
      const selectedInActiveTab = activeItems
        .filter(item => selectedSavedIds.has(item.id))
        .map(item => item.id);
      if (selectedInActiveTab.length === 0) return;

      const movingSet = new Set(selectedInActiveTab);
      const { movable, blocked } = splitMovableItems(activeItems, targetItems, movingSet);
      if (movable.length === 0) {
        if (blocked.length > 0) {
          showError('Already exists in destination tab. Kept in original tab.');
        }
        return;
      }

      const movableSet = new Set(movable.map(item => item.id));
      setTabItems(activeTab, activeItems.filter(item => !movableSet.has(item.id)));
      setTabItems(targetTab, [...movable, ...targetItems]);

      selectedSavedIds.clear();
      lastSelectedSavedId = null;
      tabsMenuPanel.hidden = true;
      closeMoveToSubmenu();
      closeCopyToSubmenu();
      closeLoadDataSubmenu();
      tabsMenuBtn.setAttribute('aria-expanded', 'false');
      if (blocked.length > 0) {
        showError(`Moved ${movable.length}. Skipped ${blocked.length} duplicates.`);
      } else {
        showError(`Moved ${movable.length} item(s).`);
      }
      persistAppState();
      renderTabs();
      renderSavedItems();
    }

    function copySelectedItemsToTab(targetTabId) {
      const modeState = getModeState();
      if (!modeState) return;
      const activeTab = getActiveTab();
      const targetTab = modeState.tabs.find(tab => tab.id === targetTabId);
      if (!activeTab || !targetTab) return;
      if (activeTab.id === targetTabId) return;
      const activeItems = getTabItems(activeTab);
      const targetItems = getTabItems(targetTab);
      const selectedInActiveTab = activeItems
        .filter(item => selectedSavedIds.has(item.id))
        .map(item => item.id);
      if (selectedInActiveTab.length === 0) return;

      const movingSet = new Set(selectedInActiveTab);
      const { movable, blocked } = splitMovableItems(activeItems, targetItems, movingSet);
      if (movable.length === 0) {
        if (blocked.length > 0) {
          showError('Already exists in destination tab.');
        }
        return;
      }

      const copied = movable.map(item => ({
        ...item,
        id: generateItemId(),
        createdAt: new Date().toISOString()
      }));
      setTabItems(targetTab, [...copied, ...targetItems]);
      tabsMenuPanel.hidden = true;
      closeMoveToSubmenu();
      closeCopyToSubmenu();
      closeLoadDataSubmenu();
      tabsMenuBtn.setAttribute('aria-expanded', 'false');
      if (blocked.length > 0) {
        showError(`Copied ${copied.length}. Skipped ${blocked.length} duplicates.`);
      } else {
        showError(`Copied ${copied.length} item(s).`);
      }
      persistAppState();
      renderTabs();
      renderSavedItems();
    }

function renderMoveToMenuItems() {
  if (!moveToList) return;
  const modeState = getModeState();
  moveToList.innerHTML = '';
  const activeTab = getActiveTab();
  if (!activeTab || !modeState) return;

  const targets = modeState.tabs.filter(tab => tab.id !== activeTab.id);
  if (targets.length === 0) {
    const empty = document.createElement('div');
    empty.className = 'tabs-menu-muted';
    empty.textContent = 'No other tabs';
    moveToList.appendChild(empty);
    return;
  }

  const activeItems = getTabItems(activeTab);

    function makeUniqueId(candidate, usedIds) {

    function getTabItems(tab, mode = appMode) {

      if (!Array.isArray(tab.itemsByMode.ko)) tab.itemsByMode.ko = [];

    function setTabItems(tab, items, mode = appMode) {

      if (!Array.isArray(tab.itemsByMode.zh)) tab.itemsByMode.zh = [];
      if (!Array.isArray(tab.itemsByMode.ja)) tab.itemsByMode.ja = [];
      if (!Array.isArray(tab.itemsByMode.ko)) tab.itemsByMode.ko = [];
      if (!Array.isArray(tab.itemsByMode.ja_ko)) tab.itemsByMode.ja_ko = [];

    function normalizeTab(tab) {

        id: tab && tab.id ? String(tab.id) : generateItemId(),
        name: tab && tab.name && String(tab.name).trim() ? String(tab.name).trim() : 'List',
        itemsByMode: { zh: [], ja: [], ko: [], ja_ko: [] }

      if (tab && tab.itemsByMode && typeof tab.itemsByMode === 'object') {
        next.itemsByMode.zh = normalizeSavedItems(Array.isArray(tab.itemsByMode.zh) ? tab.itemsByMode.zh : []);
        next.itemsByMode.ja = normalizeSavedItems(Array.isArray(tab.itemsByMode.ja) ? tab.itemsByMode.ja : []);
        next.itemsByMode.ko = normalizeSavedItems(Array.isArray(tab.itemsByMode.ko) ? tab.itemsByMode.ko : []);
        next.itemsByMode.ja_ko = normalizeSavedItems(Array.isArray(tab.itemsByMode.ja_ko) ? tab.itemsByMode.ja_ko : []);
        return next;
      }

      const legacyItems = normalizeSavedItems(tab && Array.isArray(tab.items) ? tab.items : []);
      next.itemsByMode.zh = legacyItems.filter(item => (item.mode || 'zh') !== 'ja');
      next.itemsByMode.ja = legacyItems.filter(item => (item.mode || 'zh') === 'ja');
      next.itemsByMode.ko = legacyItems.filter(item => (item.mode || 'zh') === 'ko');
      next.itemsByMode.ja_ko = legacyItems.filter(item => (item.mode || 'zh') === 'ja_ko');

    function normalizeImportedState(data) {

          modes: {
            zh: createWorkspaceFromTabs(root.modes.zh && root.modes.zh.tabs, root.modes.zh && root.modes.zh.activeTabId),
            ja: createWorkspaceFromTabs(root.modes.ja && root.modes.ja.tabs, root.modes.ja && root.modes.ja.activeTabId),

    function collectImportedTabsForMode(importedState, mode = appMode) {
      const modeKey = MODE_KEYS.includes(mode) ? mode : 'zh';
      const modeState = importedState && importedState.modes && importedState.modes[modeKey];
      if (!modeState || !Array.isArray(modeState.tabs)) return [];
      const collected = [];
      for (const tab of modeState.tabs) {
        const tabName = String((tab && tab.name) || '').trim() || 'Imported';
        const items = tab && tab.itemsByMode && Array.isArray(tab.itemsByMode[modeKey])
          ? tab.itemsByMode[modeKey]

            createdAt: item.createdAt || new Date().toISOString()
          };

          if (keys.has(key)) continue;
          keys.add(key);
          deduped.push(nextItem);

    function makeUniqueTabName(baseName = 'Imported') {

      const taken = new Set(modeState.tabs.map(tab => String(tab.name || '').trim().toLowerCase()));
      if (!taken.has(baseName.toLowerCase())) return baseName;
      let index = 2;
      while (taken.has(`${baseName} ${index}`.toLowerCase())) {

      return `${baseName} ${index}`;

    function importTabsIntoNewTabs(importedTabs) {

        const tabName = makeUniqueTabName(baseName);
        const newTab = createTab(tabName);

    function replaceAllTabsWithImportedTabs(importedTabs) {

    function getBundledPresetData(path) {

    async function loadPresetDataIntoActiveTab(path, label) {
      try {
        let parsed = getBundledPresetData(path);
        if (!parsed) {
          const res = await fetch(path, { cache: 'no-store' });
          if (!res.ok) {
            throw new Error('Failed to fetch preset data');
          }
          parsed = await res.json();
        }
        const imported = normalizeImportedState(parsed);
        if (!imported) {
          showError(`Invalid preset file: ${label}.`);
          return;
        }

        const importedTabs = collectImportedTabsForMode(imported, appMode);
        const importMode = await askImportMode();
        if (importMode === 'cancel') {
          showError('Load canceled.');
          return;
        }
        if (importMode === 'newTab') {
          if (importedTabs.length === 0) {
            showError(`No ${appMode.toUpperCase()} tabs found in ${label}.`);
            return;
          }
          importTabsIntoNewTabs(importedTabs);
          return;
        }
        if (!confirmReplaceImport()) {
          showError('Load canceled.');
          return;
        }
        replaceAllTabsWithImportedTabs(importedTabs);
      } catch {
        showError(`Failed to load ${label}.`);
      }
    }

          const normalized = normalizeTab(tab);
          return {

            name: normalized.name,
            itemsByMode: {

              ko: mode === 'ko' ? [...normalized.itemsByMode.ko] : [],
              ja_ko: mode === 'ja_ko' ? [...normalized.itemsByMode.ja_ko] : []
            }
          };

        return createWorkspaceFromTabs(tabs, shared.activeTabId);
      };

      return {

          zh: projectMode('zh'),

          ko: projectMode('ko'),

function dedupeSaved(items) {
      const seen = new Set();
      const unique = [];

      for (const item of items) {
        const key = makeSavedItemKey(item);
        if (seen.has(key)) continue;
        seen.add(key);
        unique.push(item);

function setSingleSelection(itemId) {
  selectedSavedIds.clear();
  selectedSavedIds.add(itemId);
  lastSelectedSavedId = itemId;
}

function toggleSelection(itemId) {
  if (selectedSavedIds.has(itemId)) {
    selectedSavedIds.delete(itemId);
  } else {
    selectedSavedIds.add(itemId);
  }
  lastSelectedSavedId = itemId;
}

function selectRangeTo(itemId, items, keepExisting) {
  if (!items.length) return;
  const anchorId = lastSelectedSavedId && items.some(item => item.id === lastSelectedSavedId)
    ? lastSelectedSavedId
    : itemId;
  const from = items.findIndex(item => item.id === anchorId);
  const to = items.findIndex(item => item.id === itemId);
  if (from === -1 || to === -1) {
    setSingleSelection(itemId);
    return;
  }
  const start = Math.min(from, to);
  const end = Math.max(from, to);
  if (!keepExisting) selectedSavedIds.clear();
  for (let i = start; i <= end; i += 1) {
    selectedSavedIds.add(items[i].id);
  }
  lastSelectedSavedId = itemId;
}

function handleSavedRowSelectionClick(itemId, event, items) {
  const isToggle = event.metaKey || event.ctrlKey;
  const isRange = event.shiftKey;
  if (isRange) {
    selectRangeTo(itemId, items, isToggle);
    return;
  }
  if (isToggle) {
    toggleSelection(itemId);
    return;
  }
  if (selectedSavedIds.has(itemId) && selectedSavedIds.size === 1) {
    selectedSavedIds.delete(itemId);
    if (lastSelectedSavedId === itemId) {
      lastSelectedSavedId = null;
    }
    return;
  }
  setSingleSelection(itemId);
}

function clearRowDropIndicators() {

function isDropAtSavedListEnd(clientY) {
  const rows = savedList.querySelectorAll('.saved-item');
  if (rows.length === 0) return true;
  const lastRow = rows[rows.length - 1];
  const rect = lastRow.getBoundingClientRect();
  return clientY > rect.top + rect.height / 2;
}

function reorderSavedItems(sourceId, targetId, insertAfter) {
  if (!sourceId || !targetId || sourceId === targetId) return;
  const activeTab = getActiveTab();
  if (!activeTab) return;
  const activeItems = getTabItems(activeTab);

  const movingIds = draggedSavedItemIds.length > 0
    ? draggedSavedItemIds
    : [sourceId];
  if (movingIds.includes(targetId)) return;

  const movingSet = new Set(movingIds);
  const movingItems = activeItems.filter(item => movingSet.has(item.id));
  if (movingItems.length === 0) return;

  const remaining = activeItems.filter(item => !movingSet.has(item.id));
  const targetIndex = remaining.findIndex(item => item.id === targetId);
  if (targetIndex === -1) return;

  const insertIndex = insertAfter ? targetIndex + 1 : targetIndex;
  remaining.splice(insertIndex, 0, ...movingItems);
  setTabItems(activeTab, remaining);
  persistAppState();
  renderTabs();
  renderSavedItems();
}

function reorderSavedItemsToEnd(sourceId) {
  if (!sourceId) return;
  const activeTab = getActiveTab();
  if (!activeTab) return;
  const activeItems = getTabItems(activeTab);

  const movingIds = draggedSavedItemIds.length > 0
    ? draggedSavedItemIds
    : [sourceId];
  const movingSet = new Set(movingIds);
  const movingItems = activeItems.filter(item => movingSet.has(item.id));
  if (movingItems.length === 0) return;

  const remaining = activeItems.filter(item => !movingSet.has(item.id));
  setTabItems(activeTab, [...remaining, ...movingItems]);
  persistAppState();
  renderTabs();
  renderSavedItems();
}

function renderFlashCard(items) {
  if (!flashCardStage) return;
  if (!isFlashCardMode) {
    flashCardStage.hidden = true;
    savedList.hidden = false;
    return;
  }

  savedList.hidden = true;
  flashCardStage.hidden = false;
  flashCardStage.innerHTML = '';

  if (!items.length) {
    const empty = document.createElement('div');
    empty.className = 'flashcard-empty';
    empty.textContent = 'No saved words yet.';
    flashCardStage.appendChild(empty);
    if (!isPlayAllActive) {
      setPlayAllProgress(0, 0);
    }
    return;
  }

  if (!flashCardCurrentId || !items.some(item => item.id === flashCardCurrentId)) {
    flashCardCurrentId = items[0].id;
  }

  const activeItem = isPlayAllActive && nowPlayingSavedId
    ? (items.find(item => item.id === nowPlayingSavedId) || items[0])
    : (items.find(item => item.id === flashCardCurrentId) || items[0]);
  flashCardCurrentId = activeItem.id;
  const activeIndex = items.findIndex(item => item.id === activeItem.id);
  const hideAnswer = isPlayAllActive && flashCardHideAnswer;
  if (!isPlayAllActive) {
    setPlayAllProgress(activeIndex + 1, items.length);
  }

  const card = document.createElement('article');
  card.className = 'flashcard-card';

  const meta = document.createElement('div');
  meta.className = 'flashcard-meta';
  meta.textContent = nowPlayingSavedId ? 'Now Reading' : 'Flash Card';

  const target = document.createElement('div');
  target.className = 'flashcard-target';
  target.textContent = activeItem.target || activeItem.zh || '-';

  const reading = document.createElement('div');
  reading.className = 'flashcard-reading';
  reading.textContent = hideAnswer ? '...' : (activeItem.reading || activeItem.pinyin || '-');
  if (hideAnswer) reading.classList.add('is-concealed');

  const source = document.createElement('div');
  source.className = 'flashcard-source';
  source.textContent = hideAnswer ? '...' : (activeItem.source || '-');
  if (hideAnswer) source.classList.add('is-concealed');

  card.appendChild(meta);
  card.appendChild(target);
  card.appendChild(reading);
  card.appendChild(source);

  const nav = document.createElement('div');
  nav.className = 'flashcard-nav';
  const prevBtn = document.createElement('button');
  prevBtn.id = 'flashCardPrevInlineBtn';
  prevBtn.className = 'secondary flashcard-nav-btn';
  prevBtn.type = 'button';
  prevBtn.setAttribute('aria-label', 'Previous card');
  prevBtn.textContent = '←';
  prevBtn.addEventListener('click', () => moveFlashCard(-1));

  const playBtn = document.createElement('button');
  playBtn.className = 'secondary flashcard-nav-btn flashcard-play-btn';
  playBtn.type = 'button';
  playBtn.setAttribute('aria-label', 'Play pronunciation');
  playBtn.title = 'Play pronunciation';
  playBtn.textContent = '▶';
  playBtn.addEventListener('click', () => playSavedItem(activeItem));

  const nextBtn = document.createElement('button');
  nextBtn.id = 'flashCardNextInlineBtn';
  nextBtn.className = 'secondary flashcard-nav-btn';
  nextBtn.type = 'button';
  nextBtn.setAttribute('aria-label', 'Next card');
  nextBtn.textContent = '→';
  nextBtn.addEventListener('click', () => moveFlashCard(1));

  nav.appendChild(prevBtn);
  nav.appendChild(playBtn);
  nav.appendChild(nextBtn);
  card.appendChild(nav);
  flashCardStage.appendChild(card);
  updateFlashCardNavButtons();
}

function renderSavedItems() {
      const activeTab = getActiveTab();
      const items = activeTab ? getTabItems(activeTab) : [];
      savedList.innerHTML = '';

      if (isFlashCardMode) {
        renderFlashCard(items);
        updateBatchDeleteState();
        return;
      }

      if (items.length === 0) {
        const li = document.createElement('li');
        li.className = 'hint';
        li.textContent = 'No saved words yet.';
        savedList.appendChild(li);
        renderFlashCard(items);
        updateBatchDeleteState();
        return;
      }

  for (const item of items) {
    const isSelected = selectedSavedIds.has(item.id);
    const li = document.createElement('li');
    li.className = `saved-item mode-${item.mode || 'zh'}${isSelected ? ' is-selected' : ''}${nowPlayingSavedId === item.id ? ' is-playing' : ''}`;
    if (isSelected) {
      const selectedCount = selectedSavedIds.size;
      li.title = `${selectedCount} selected`;
    }
    li.draggable = true;
    li.dataset.id = item.id;
    li.addEventListener('click', (event) => {
      const target = event.target;
      if (target instanceof HTMLElement) {
        if (target.closest('button')) return;
      }
      handleSavedRowSelectionClick(item.id, event, items);
      renderSavedItems();
    });

    li.addEventListener('dragstart', (event) => {
      if (!selectedSavedIds.has(item.id)) {
        setSingleSelection(item.id);
      }
      dragSourceId = item.id;
      draggedSavedItemId = item.id;
      const modeState = getModeState();
      draggedFromTabId = modeState ? modeState.activeTabId : null;
      draggedSavedItemIds = items
        .filter(row => selectedSavedIds.has(row.id))
        .map(row => row.id);
      if (event.dataTransfer) {
        event.dataTransfer.effectAllowed = 'move';
        event.dataTransfer.setData('text/plain', item.id);
      }
      li.classList.add('is-dragging');
        });
        li.addEventListener('dragend', () => {
      dragSourceId = null;
      draggedSavedItemId = null;
      draggedSavedItemIds = [];
      draggedFromTabId = null;
      li.classList.remove('is-dragging');
      savedList.classList.remove('drag-over-end');
      clearRowDropIndicators();
      clearTabDropHighlights();
        });
        li.addEventListener('dragover', (event) => {
          event.preventDefault();
          clearRowDropIndicators();
          li.classList.add('drag-over');
          const rect = li.getBoundingClientRect();
          const insertAfter = event.clientY > rect.top + rect.height / 2;
          li.classList.add(insertAfter ? 'drag-insert-after' : 'drag-insert-before');
        });
        li.addEventListener('dragleave', () => {
          li.classList.remove('drag-over', 'drag-insert-before', 'drag-insert-after');
        });
        li.addEventListener('drop', (event) => {
          event.preventDefault();
          event.stopPropagation();
          const insertAfter = li.classList.contains('drag-insert-after');
          li.classList.remove('drag-over', 'drag-insert-before', 'drag-insert-after');
          reorderSavedItems(dragSourceId, item.id, insertAfter);
        });

        const inputCell = document.createElement('div');
        inputCell.className = 'saved-cell saved-source';
        inputCell.textContent = item.source || '-';

        const zhCell = document.createElement('div');
        zhCell.className = 'saved-cell saved-zh saved-chinese';
        zhCell.textContent = item.target || item.zh || '-';

        const pinyinCell = document.createElement('div');
        pinyinCell.className = 'saved-cell saved-pinyin';
        pinyinCell.textContent = item.reading || item.pinyin || '-';

        const kataCell = document.createElement('div');
        kataCell.className = 'saved-cell saved-katakana';
        kataCell.textContent = item.katakana || '-';

        const playBtn = document.createElement('button');
        playBtn.className = 'secondary saved-action-btn saved-play';
        playBtn.textContent = '▶';
        playBtn.setAttribute('aria-label', 'Play pronunciation');
        playBtn.title = 'Play pronunciation';
        playBtn.addEventListener('click', () => playSavedItem(item));

        const copyBtn = document.createElement('button');
        copyBtn.className = 'secondary saved-action-btn saved-copy';
        copyBtn.textContent = '⧉';
        copyBtn.setAttribute('aria-label', 'Copy item');
        copyBtn.title = 'Copy item';
        copyBtn.addEventListener('click', async () => {
          const text = formatSavedItemForCopy(item);
          const ok = await copyTextToClipboard(text);
          showError(ok ? 'Copied.' : 'Copy failed.');
        });

        const deleteBtn = document.createElement('button');
        deleteBtn.className = 'danger saved-action-btn saved-delete';
        deleteBtn.textContent = '✕';
        deleteBtn.setAttribute('aria-label', 'Delete item');
        deleteBtn.title = 'Delete item';
        deleteBtn.addEventListener('click', () => {
          const activeTab = getActiveTab();
          if (!activeTab) return;
          const ok = window.confirm('Delete this item?');
          if (!ok) return;
          const activeItems = getTabItems(activeTab);
          setTabItems(activeTab, activeItems.filter(row => row.id !== item.id));
          selectedSavedIds.delete(item.id);
          if (lastSelectedSavedId === item.id) {
            lastSelectedSavedId = null;
          }
          persistAppState();
          renderTabs();
          renderSavedItems();
        });

        const actionsCell = document.createElement('div');
        actionsCell.className = 'saved-actions';
        actionsCell.appendChild(playBtn);
        actionsCell.appendChild(copyBtn);
        actionsCell.appendChild(deleteBtn);

        li.appendChild(inputCell);
        li.appendChild(zhCell);
        li.appendChild(pinyinCell);
        li.appendChild(kataCell);
        li.appendChild(actionsCell);
        savedList.appendChild(li);
  }
  renderFlashCard(items);
  updateBatchDeleteState();
  if (!tabsMenuPanel.hidden) {
    renderMoveToMenuItems();
    renderCopyToMenuItems();
  }
}

    function formatSavedItemForCopy(item) {
      const source = String(item.source || '').trim();
      const target = String(item.target || item.zh || '').trim();
      const reading = String(item.reading || item.pinyin || '').trim();
      const extra = String(item.katakana || '').trim();
      return [source, target, reading, extra].filter(Boolean).join(' | ');
    }

    async function copyTextToClipboard(text) {
      const value = String(text || '');
      if (!value) return false;
      try {
        if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
          await navigator.clipboard.writeText(value);
          return true;
        }
      } catch {
        // fallback below
      }
      try {
        const textarea = document.createElement('textarea');
        textarea.value = value;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'fixed';
        textarea.style.top = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        const ok = document.execCommand('copy');
        textarea.remove();
        return Boolean(ok);
      } catch {
        return false;
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    if (window.speechSynthesis && typeof window.speechSynthesis.onvoiceschanged !== 'undefined') {
      window.speechSynthesis.onvoiceschanged = () => {
        // Trigger loading voices for browsers that populate voices asynchronously.
        window.speechSynthesis.getVoices();
      };
    }

  </script>
</body>
