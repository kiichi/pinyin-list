<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#9b5a2f" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Mandarin" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Mandarin Together</title>
  <link rel="icon" href="favicon.ico" sizes="any" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="icons/apple-touch-icon.png" />
  <link rel="manifest" href="site.webmanifest" />
  <style>
:root {
  --bg: #f4efe6;
  --panel: #fffdf8;
  --ink: #1f1a14;
  --muted: #6e6559;
  --line: #dfd5c8;
  --accent: #9b5a2f;
  --accent-soft: #f1dfce;
  --danger: #b7372f;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  font-family: "Noto Sans JP", "Hiragino Kaku Gothic ProN", sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at 20% 10%, #fff8ee 0%, transparent 40%),
    radial-gradient(circle at 80% 0%, #f0e0cf 0%, transparent 35%),
    var(--bg);
  min-height: 100vh;
  padding: 12px;
  overflow-x: hidden;
}

.app {
  width: 100%;
  max-width: 820px;
  margin: 0 auto;
  background: var(--panel);
  border: 1px solid var(--line);
  border-radius: 6px;
  box-shadow: 0 4px 14px rgba(31, 26, 20, 0.06);
}

header {
  position: relative;
  padding: 12px 14px;
  padding-right: 56px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(90deg, #fff8ef, #f8efdf);
}

h1 {
  margin: 0;
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: 0.02em;
}

.subtitle {
  display: none;
}

.mode-row {
  margin-top: 6px;
  display: inline-flex;
  align-items: center;
  gap: 8px;
}

.mode-label {
  color: var(--muted);
  font-size: 0.82rem;
}

.mode-select {
  border: 1px solid var(--line);
  border-radius: 4px;
  background: #fff;
  color: var(--ink);
  padding: 6px 8px;
  font-size: 0.85rem;
}

.lookup-row {
  display: grid;
  grid-template-columns: minmax(0, 2fr) minmax(0, 1fr) minmax(0, 1.2fr) minmax(0, 1.2fr) auto;
  border-bottom: 1px solid var(--line);
  background: #fff;
  min-width: 0;
}

.cell {
  min-height: 96px;
  padding: 12px 14px;
  border-right: 1px solid var(--line);
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 8px;
}

.cell:last-child {
  border-right: none;
}

.cell-label {
  color: var(--muted);
  font-size: 0.8rem;
}

.cell-value {
  font-size: 1.05rem;
  word-break: break-word;
}

.cell-value.zh {
  font-size: 1.8rem;
  line-height: 1.2;
}

.input-inline {
  width: 100%;
  height: 36px;
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 7px 10px;
  font-size: 0.9rem;
  background: #fff;
  color: var(--ink);
}

button {
  border: none;
  border-radius: 4px;
  padding: 10px 14px;
  font-size: 0.95rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform 0.1s ease, opacity 0.2s ease;
}

button:active {
  transform: translateY(1px);
}

button[disabled] {
  opacity: 0.55;
  cursor: not-allowed;
}

.secondary {
  background: var(--accent-soft);
  color: #5a3419;
}

.danger {
  background: #f9e2df;
  color: var(--danger);
}

.pinyin-inline {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}

.play-inline {
  width: 34px;
  height: 34px;
  min-width: 34px;
  padding: 0;
  font-size: 0.95rem;
  line-height: 1;
}

.save-cell {
  padding: 0;
  align-items: stretch;
  justify-content: stretch;
}

.save-cell .cell-label {
  display: none;
}

.save-inline {
  width: 100%;
  height: 100%;
  min-width: 0;
  min-height: 96px;
  padding: 0 14px;
  font-size: 1rem;
  font-weight: 700;
  letter-spacing: 0.01em;
  line-height: 1;
  border-radius: 0;
  border: 2px solid #7b4521;
  background: linear-gradient(180deg, #f5dfc6, #eec79f);
  color: #4a2b14;
  box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.45);
}

.save-inline:not([disabled]):hover {
  background: linear-gradient(180deg, #f8e6d1, #f1d1af);
}

.save-inline[disabled] {
  border-color: #a27b5b;
  background: linear-gradient(180deg, #efe3d5, #e5d5c4);
  color: #7a6755;
  box-shadow: none;
}

.saved {
  position: relative;
  padding: 20px;
  overflow: visible;
  min-width: 0;
}

.status-bar {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  gap: 6px;
  margin-bottom: 4px;
  min-width: 0;
}

.tabs-menu-wrap.top-right-menu {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 110;
}

.import-choice-dialog {
  position: fixed;
  inset: 0;
  background: rgba(31, 26, 20, 0.45);
  z-index: 120;
  display: grid;
  place-items: center;
  padding: 14px;
}

.import-choice-dialog[hidden] {
  display: none !important;
}

.import-choice-card {
  width: min(420px, 100%);
  background: #fffdf8;
  border: 1px solid var(--line);
  border-radius: 6px;
  box-shadow: 0 14px 28px rgba(31, 26, 20, 0.22);
  padding: 14px;
}

.import-choice-title {
  margin: 0;
  font-size: 1rem;
  font-weight: 700;
}

.import-choice-text {
  margin: 8px 0 0;
  color: var(--muted);
  font-size: 0.9rem;
}

.import-choice-actions {
  margin-top: 12px;
  display: grid;
  gap: 8px;
}

.import-choice-btn {
  width: 100%;
  justify-content: center;
  min-height: 36px;
}

.import-choice-danger {
  background: #f7d7d4;
  color: #8e2f2a;
  border: 1px solid #e7b5b0;
}

.import-choice-danger:hover {
  background: #f4cbc7;
}

.scroll-top-fab {
  position: fixed;
  right: 16px;
  bottom: 16px;
  width: 44px;
  height: 44px;
  min-width: 44px;
  padding: 0;
  border-radius: 999px;
  border: 1px solid #6f3f20;
  background: linear-gradient(180deg, #f4debf, #e7bf92);
  color: #4a2b14;
  font-size: 1rem;
  font-weight: 800;
  line-height: 1;
  box-shadow: 0 10px 22px rgba(31, 26, 20, 0.2);
  z-index: 95;
}

.scroll-top-fab:hover {
  background: linear-gradient(180deg, #f7e6d0, #ebcaa4);
}

.scroll-top-fab[hidden] {
  display: none !important;
}

.playall-progress {
  margin-bottom: 12px;
  border: 1px solid var(--line);
  border-radius: 4px;
  background: #fff;
  padding: 8px 10px;
  position: -webkit-sticky;
  position: sticky;
  top: 12px;
  z-index: 30;
  box-shadow: 0 8px 18px rgba(31, 26, 20, 0.12);
}

.playall-progress-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
  margin-bottom: 6px;
}

.playall-progress-right {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-left: auto;
}

.controller-close-btn {
  width: 24px;
  height: 24px;
  min-width: 24px;
  padding: 0;
  font-size: 0.82rem;
  line-height: 1;
  border-radius: 4px;
}

.playall-progress-left {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  min-width: 0;
}

.playall-widget-btn {
  padding: 5px 10px;
  font-size: 0.82rem;
  line-height: 1;
  min-height: 28px;
  position: relative;
}

.playall-widget-btn.is-playing {
  padding-left: 24px;
}

.playall-widget-btn.is-playing::before {
  content: '';
  position: absolute;
  left: 8px;
  top: 50%;
  width: 10px;
  height: 10px;
  border: 2px solid #7b4521;
  border-right-color: transparent;
  border-radius: 999px;
  transform: translateY(-50%) rotate(0deg);
  animation: playall-stop-spin 0.8s linear infinite;
}

@keyframes playall-stop-spin {
  to {
    transform: translateY(-50%) rotate(360deg);
  }
}

.playall-mode-wrap {
  position: relative;
  display: inline-flex;
  align-items: center;
}

.playall-mode-wrap .playall-widget-btn {
  border-top-right-radius: 0;
  border-bottom-right-radius: 0;
}

.playall-mode-btn {
  width: 22px;
  min-width: 22px;
  height: 28px;
  padding: 0;
  border-radius: 0 3px 3px 0;
  margin-left: 0;
  border-left-width: 0;
  position: relative;
  line-height: 1;
  font-size: 0.72rem;
}

.playall-mode-btn::before {
  content: '';
  position: absolute;
  left: 0;
  top: 4px;
  bottom: 4px;
  width: 1px;
  background: rgba(123, 69, 33, 0.35);
  pointer-events: none;
}

.playall-mode-menu {
  position: absolute;
  top: calc(100% + 4px);
  left: 0;
  min-width: 190px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 4px;
  box-shadow: 0 8px 18px rgba(31, 26, 20, 0.12);
  z-index: 40;
  display: grid;
  padding: 4px;
}

.playall-mode-menu[hidden] {
  display: none !important;
}

.playall-mode-item {
  width: 100%;
  border: 0;
  background: transparent;
  color: var(--ink);
  text-align: left;
  border-radius: 2px;
  padding: 7px 9px;
  font-size: 0.82rem;
  font-weight: 500;
}

.playall-mode-item:hover {
  background: #f8efe3;
}

.playall-mode-item.is-active {
  background: #f3fbf6;
  color: #1f5a39;
}

.playall-toggle-btn {
  padding: 6px 10px;
  font-size: 0.82rem;
  line-height: 1;
}

.playall-toggle-btn.is-on {
  background: #d7ebdd;
  color: #1f5a39;
}

.playall-repeat-label {
  color: var(--muted);
  font-size: 0.78rem;
}

.playall-repeat-select {
  border: 1px solid var(--line);
  border-radius: 4px;
  background: #fff;
  color: var(--ink);
  padding: 4px 6px;
  font-size: 0.82rem;
}

.playall-source-toggle {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--muted);
  font-size: 0.78rem;
  user-select: none;
}

.playall-source-toggle input {
  margin: 0;
}

.playall-progress-title {
  color: var(--ink);
  font-size: 0.84rem;
  font-weight: 700;
}

.playall-progress-text {
  color: var(--muted);
  font-size: 0.8rem;
}

.controller-toggle-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  vertical-align: middle;
  margin: 0 6px 0 0;
  width: 34px;
  height: 34px;
  padding: 0;
  font-size: 0.9rem;
  line-height: 1;
  border-radius: 3px;
}

.playall-progress[hidden] {
  display: none !important;
}

.playall-progress-track {
  height: 8px;
  border-radius: 999px;
  background: #efe4d6;
  overflow: hidden;
}

.playall-progress-fill {
  width: 0%;
  height: 100%;
  border-radius: 999px;
  background: linear-gradient(90deg, #cf8e5f, #9b5a2f);
  transition: width 0.24s ease;
}

.flashcard-stage {
  margin-bottom: 12px;
}

.flashcard-card {
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fff;
  padding: 14px;
  min-height: 180px;
  display: grid;
  gap: 10px;
  align-content: start;
}

.flashcard-meta {
  color: var(--muted);
  font-size: 0.8rem;
}

.flashcard-target {
  font-size: 2rem;
  line-height: 1.25;
  word-break: break-word;
}

.flashcard-reading {
  font-size: 1.05rem;
  color: #503a26;
  word-break: break-word;
}

.flashcard-target.is-concealed,
.flashcard-reading.is-concealed,
.flashcard-source.is-concealed {
  color: #a89c8d;
  letter-spacing: 0.08em;
}

.flashcard-source {
  font-size: 0.95rem;
  color: var(--muted);
  word-break: break-word;
}

.flashcard-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
  margin-top: 4px;
}

.flashcard-nav-btn {
  width: 30px;
  height: 30px;
  min-width: 30px;
  padding: 0;
  font-size: 1rem;
  line-height: 1;
  border-radius: 4px;
}

.flashcard-play-btn {
  width: 34px;
  min-width: 34px;
}

.flashcard-empty {
  border: 1px dashed var(--line);
  border-radius: 6px;
  color: var(--muted);
  padding: 14px;
  background: #fff;
}

.tabs-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
  flex-wrap: wrap;
  min-width: 0;
}

.tabs-list {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  flex: 1;
  align-items: flex-end;
  border-bottom: 1px solid var(--line);
  padding-bottom: 2px;
  min-width: 0;
}

.tabs-menu-wrap {
  position: relative;
}

.tabs-menu-btn {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  border-radius: 4px;
  width: 34px;
  height: 34px;
  padding: 0;
  font-size: 1.25rem;
  line-height: 1;
}

.tabs-menu-panel {
  position: absolute;
  right: 0;
  top: 38px;
  min-width: 150px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 4px;
  box-shadow: 0 6px 18px rgba(31, 26, 20, 0.08);
  display: grid;
  padding: 4px;
  z-index: 20;
}

.tabs-menu-mobile-shell {
  display: contents;
}

.tabs-menu-mobile-head {
  display: none;
}

.tabs-menu-mobile-close {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--ink);
  border-radius: 4px;
  width: 30px;
  height: 30px;
  min-width: 30px;
  padding: 0;
  font-size: 1rem;
  line-height: 1;
}

.tabs-submenu-wrap {
  position: relative;
}

.tabs-menu-item {
  width: 100%;
  text-align: left;
  border: 0;
  background: transparent;
  color: var(--ink);
  border-radius: 2px;
  padding: 8px 10px;
  font-size: 0.9rem;
}

.tabs-menu-item:hover {
  background: #f8efe3;
}

.tabs-submenu-trigger {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.tabs-submenu-trigger[aria-expanded="true"] {
  background: #f8efe3;
}

.tabs-submenu-arrow {
  font-size: 0.86rem;
  color: var(--muted);
  margin-left: 8px;
}

.tabs-submenu-panel {
  position: absolute;
  left: calc(100% - 2px);
  right: auto;
  top: -4px;
  min-width: 180px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 4px;
  box-shadow: 0 6px 18px rgba(31, 26, 20, 0.08);
  display: grid;
  padding: 4px;
  z-index: 22;
}

.tabs-submenu-panel[hidden] {
  display: none !important;
}

.tabs-menu-item.danger {
  color: #8e2f2a;
}

.tabs-menu-item.danger:hover {
  background: #fbe8e6;
}

.tabs-menu-sep {
  height: 1px;
  background: var(--line);
  margin: 4px 0;
}

.tabs-menu-label {
  color: var(--muted);
  font-size: 0.78rem;
  padding: 6px 10px 2px;
}

.tabs-move-list {
  display: grid;
}

.tabs-menu-muted {
  color: var(--muted);
  font-size: 0.85rem;
  padding: 8px 10px;
}

.tabs-menu-panel[hidden] {
  display: none !important;
}

.tab-item {
  display: inline-flex;
  align-items: center;
  gap: 0;
  padding: 0;
  position: relative;
}

.tab-item.active {
  color: var(--accent);
}

.tab-item.drag-over-target {
  background: #f3fbf6;
}

.tab-item.drag-over-reorder .tab-btn {
  border-color: #2f7d54;
}

.tab-item.drag-insert-left::before,
.tab-item.drag-insert-right::after {
  content: '';
  position: absolute;
  top: 4px;
  bottom: 4px;
  width: 2px;
  background: #2f7d54;
}

.tab-item.drag-insert-left::before {
  left: -4px;
}

.tab-item.drag-insert-right::after {
  right: -4px;
}

.tab-item.is-dragging {
  opacity: 0.55;
}

.tab-btn {
  background: var(--accent-soft);
  color: var(--ink);
  border: 1px solid var(--line);
  border-right-width: 0;
  border-radius: 4px 0 0 0;
  height: 24px;
  padding: 0 10px;
  display: inline-flex;
  align-items: center;
  max-width: 100%;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  line-height: 1;
  font-size: 0.85rem;
}

.tab-item.active .tab-btn {
  color: var(--accent);
  background: #f7ecdf;
  border-color: #d8c0a9;
  border-right-width: 0;
}

.tab-seg-wrap {
  position: relative;
  margin-left: -1px;
}

.tab-seg-btn {
  border: 1px solid var(--line);
  background: var(--accent-soft);
  color: #5a3419;
  border-left-width: 0;
  border-radius: 0 4px 0 0;
  width: 24px;
  height: 24px;
  min-width: 24px;
  padding: 0;
  font-size: 0.95rem;
  line-height: 1;
  position: relative;
}

.tab-seg-btn:hover {
  background: #f3e3d3;
}

.tab-seg-btn::before {
  content: '';
  position: absolute;
  left: 0;
  top: 0;
  bottom: 0;
  width: 1px;
  background: rgba(123, 69, 33, 0.28);
  pointer-events: none;
}

.tab-seg-menu {
  position: absolute;
  right: 0;
  top: calc(100% + 4px);
  min-width: 170px;
  background: #fff;
  border: 1px solid var(--line);
  border-radius: 4px;
  box-shadow: 0 6px 18px rgba(31, 26, 20, 0.08);
  display: grid;
  padding: 4px;
  z-index: 25;
}

.tab-seg-menu[hidden] {
  display: none !important;
}

.tab-name-input {
  width: 140px;
  border: 1px solid var(--line);
  border-radius: 2px;
  padding: 6px 8px;
  font-size: 0.9rem;
  background: #fff;
  color: var(--ink);
}

.tab-add-btn {
  border: 1px solid var(--line);
  background: var(--accent-soft);
  color: #5a3419;
  border-radius: 4px 4px 0 0;
  width: 24px;
  height: 24px;
  padding: 0;
  font-size: 0.95rem;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 0;
}

.tab-add-btn:hover {
  background: #f3e3d3;
}

.saved-list {
  list-style: none;
  margin: 0;
  padding: 0;
  display: grid;
  gap: 6px;
  min-height: 48px;
  min-width: 0;
}

.saved-list.drag-over-end {
  outline: 2px dashed #b6dfc7;
  outline-offset: 4px;
  border-radius: 4px;
}

.saved-item {
  border: 1px solid var(--line);
  border-radius: 4px;
  padding: 8px 10px;
  display: grid;
  grid-template-columns: minmax(0, 1.5fr) minmax(0, 1fr) minmax(0, 1.2fr) minmax(0, 1.2fr) auto;
  gap: 8px;
  align-items: center;
  background: #fff;
  cursor: grab;
  position: relative;
}

.saved-item.is-selected {
  border-color: #2f7d54;
  box-shadow: inset 0 0 0 1px #b6dfc7;
  background: #f3fbf6;
}

.saved-item.is-playing {
  border-color: #9b5a2f;
  box-shadow: inset 0 0 0 1px #f0d1b4;
  background: #fff6eb;
}

.saved-item.is-dragging {
  opacity: 0.55;
}

.saved-item.drag-over {
  border-color: var(--accent);
  box-shadow: inset 0 0 0 1px var(--accent-soft);
}

.saved-item.drag-insert-before::before,
.saved-item.drag-insert-after::after {
  content: '';
  position: absolute;
  left: 6px;
  right: 6px;
  height: 2px;
  background: #2f7d54;
}

.saved-item.drag-insert-before::before {
  top: -2px;
}

.saved-item.drag-insert-after::after {
  bottom: -2px;
}

.saved-cell {

          <div class="tabs-menu-mobile-shell">

            <button id="deleteAllTabsBtn" class="tabs-menu-item danger" type="button">Delete All Tabs</button>

        </div>
      </div>

      </div>
      <div class="cell">

        </div>
      </div>

        <button id="saveBtn" class="secondary save-inline" aria-label="Save to list" title="Save to list" disabled>+ Add</button>
      </div>

    <section class="saved">
      <div class="status-bar">
        <div id="errorBox" class="error"></div>
      </div>
      <div id="playAllProgress" class="playall-progress">

          <div class="playall-progress-left">
            <div class="playall-mode-wrap">
              <button id="playAllWidgetBtn" class="secondary playall-widget-btn" type="button">Play All</button>
              <button id="playAllModeBtn" class="secondary playall-mode-btn" type="button" aria-haspopup="true" aria-expanded="false" aria-label="Play mode">▾</button>
              <div id="playAllModeMenu" class="playall-mode-menu" hidden>
                <button id="playFromBeginningBtn" class="playall-mode-item" type="button">Play from the beginning</button>
                <button id="playFromCurrentBtn" class="playall-mode-item" type="button">Play from the current item</button>
                <button id="playRandomBtn" class="playall-mode-item" type="button">Play at random</button>
              </div>
            </div>
            <button id="flashCardToggleBtn" class="secondary playall-toggle-btn" type="button" aria-pressed="false">Flash Card Off</button>
            <label class="playall-repeat-label" for="playAllRepeatSelect">Repeat</label>
            <select id="playAllRepeatSelect" class="playall-repeat-select" aria-label="Repeat each word">
              <option value="1">1x</option>
              <option value="2" selected>2x</option>
              <option value="3">3x</option>
            </select>
            <label class="playall-repeat-label" for="playAllIntervalSelect">Interval</label>
            <select id="playAllIntervalSelect" class="playall-repeat-select" aria-label="Interval between plays">
              <option value="1000">1s</option>
              <option value="1500" selected>1.5s</option>
              <option value="2000">2s</option>
            </select>
            <label class="playall-source-toggle">
              <input id="playAllReadSourceCheckbox" type="checkbox" checked />
              <span>Read both</span>
            </label>
          </div>
          <div class="playall-progress-right">
            <span id="playAllProgressText" class="playall-progress-text">0 / 0</span>
            <button id="controllerCloseBtn" class="secondary controller-close-btn" type="button" aria-label="Hide controller" title="Hide controller">✕</button>
          </div>
        </div>
        <div class="playall-progress-track" role="progressbar" aria-label="Play all progress" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
          <div id="playAllProgressFill" class="playall-progress-fill"></div>
        </div>
      </div>
      <div class="tabs-bar">
        <div id="tabsList" class="tabs-list"></div>
      </div>
      <input id="importFileInput" type="file" accept="application/json,.json" hidden />
      <div id="flashCardStage" class="flashcard-stage" hidden></div>
      <ul id="savedList" class="saved-list"></ul>
    </section>
  </main>
  <div id="importChoiceDialog" class="import-choice-dialog" hidden>
    <div class="import-choice-card" role="dialog" aria-modal="true" aria-labelledby="importChoiceTitle">
      <h2 id="importChoiceTitle" class="import-choice-title">Import Data</h2>

        <button id="importChoiceCancelBtn" class="import-choice-btn" type="button">Cancel</button>
      </div>
    </div>
  </div>
  <button id="scrollTopFab" class="scroll-top-fab" type="button" aria-label="Scroll to top" title="Scroll to top" hidden>↑</button>

function normalizePlayAllStartMode(mode) {
  return mode === 'current' || mode === 'random' ? mode : 'beginning';

  if (normalized === 'current') return 'Play Current';

}

function shuffleArray(input) {
  const out = [...input];
  for (let i = out.length - 1; i > 0; i -= 1) {
    const j = Math.floor(Math.random() * (i + 1));
    const temp = out[i];
    out[i] = out[j];
    out[j] = temp;
  }
  return out;
}

function getCurrentPlayAnchorId() {

}

function updateFlashCardToggleUi() {
  if (!flashCardToggleBtn) return;
  flashCardToggleBtn.textContent = isFlashCardMode ? 'Flash Card On' : 'Flash Card Off';
  flashCardToggleBtn.setAttribute('aria-pressed', String(isFlashCardMode));
  flashCardToggleBtn.classList.toggle('is-on', isFlashCardMode);
}

function toggleFlashCardMode() {
  isFlashCardMode = !isFlashCardMode;
  if (isFlashCardMode && !flashCardCurrentId) {
    const activeTab = getActiveTab();
    const items = activeTab ? getTabItems(activeTab) : [];
    flashCardCurrentId = items[0] ? items[0].id : null;
  }
  updateFlashCardToggleUi();
  updateFlashCardNavButtons();
  renderSavedItems();
}

function moveFlashCard(step) {
  if (!isFlashCardMode || isPlayAllActive) return;
  const activeTab = getActiveTab();
  const items = activeTab ? getTabItems(activeTab) : [];
  if (!items.length) return;
  const currentId = flashCardCurrentId && items.some(item => item.id === flashCardCurrentId)
    ? flashCardCurrentId
    : items[0].id;
  const currentIndex = items.findIndex(item => item.id === currentId);
  const nextIndex = currentIndex + step;
  if (nextIndex < 0 || nextIndex >= items.length) return;
  flashCardCurrentId = items[nextIndex].id;
  updateFlashCardNavButtons();
  renderSavedItems();
}

function updateFlashCardNavButtons() {
  const prevBtn = document.getElementById('flashCardPrevInlineBtn') || flashCardPrevBtn;
  const nextBtn = document.getElementById('flashCardNextInlineBtn') || flashCardNextBtn;
  if (!prevBtn || !nextBtn) return;
  const activeTab = getActiveTab();
  const items = activeTab ? getTabItems(activeTab) : [];
  const enabled = isFlashCardMode && !isPlayAllActive && items.length > 0;
  if (!enabled) {
    prevBtn.disabled = true;
    nextBtn.disabled = true;
    return;
  }
  const currentId = flashCardCurrentId && items.some(item => item.id === flashCardCurrentId)
    ? flashCardCurrentId
    : items[0].id;
  const currentIndex = items.findIndex(item => item.id === currentId);
  prevBtn.disabled = currentIndex <= 0;
  nextBtn.disabled = currentIndex >= items.length - 1;
}

function closeAllTabActionMenus() {
  openTabActionMenuTabId = null;
  const menus = tabsList.querySelectorAll('.tab-seg-menu');
  menus.forEach((menu) => {
    if (menu instanceof HTMLElement) menu.hidden = true;
  });
  const buttons = tabsList.querySelectorAll('.tab-seg-btn[aria-expanded="true"]');
  buttons.forEach((btn) => btn.setAttribute('aria-expanded', 'false'));
}

function toggleTabActionMenu(tabId, menuEl, btnEl, onOpen) {
  if (!(menuEl instanceof HTMLElement) || !(btnEl instanceof HTMLElement)) return;
  const isOpen = !menuEl.hidden && openTabActionMenuTabId === tabId;
  closeAllTabActionMenus();
  if (isOpen) return;
  if (typeof onOpen === 'function') {
    onOpen();
  }
  openTabActionMenuTabId = tabId;
  menuEl.hidden = false;
  btnEl.setAttribute('aria-expanded', 'true');
}

function wireSubmenuHover(triggerBtn, onEnter, onLeave) {
  if (!triggerBtn) return;
  const wrap = triggerBtn.closest('.tabs-submenu-wrap');
  if (!wrap) return;
  wrap.addEventListener('mouseenter', () => {
    if (tabsMenuPanel.hidden) return;
    onEnter();
  });
  wrap.addEventListener('mouseleave', () => {
    onLeave();
  });
}

  if (!(target instanceof HTMLElement)) return;

    savedList.classList.remove('drag-over-end');
    return;

    savedList.classList.add('drag-over-end');

  }
  savedList.classList.remove('drag-over-end');
});

});

function deleteSelectedItemsInActiveTab() {
  if (selectedSavedIds.size === 0) return;
  const activeTab = getActiveTab();
  if (!activeTab) return;
  const count = selectedSavedIds.size;
  const ok = window.confirm(`Delete ${count} selected item(s)?`);
  if (!ok) return;
  const activeItems = getTabItems(activeTab);
  setTabItems(activeTab, activeItems.filter(item => !selectedSavedIds.has(item.id)));
  selectedSavedIds.clear();
  lastSelectedSavedId = null;
  tabsMenuPanel.hidden = true;
  closeMoveToSubmenu();
  closeCopyToSubmenu();
  closeLoadDataSubmenu();
  tabsMenuBtn.setAttribute('aria-expanded', 'false');
  persistAppState();
  renderTabs();
  renderSavedItems();
}

function clearAllItemsInTab(tabId) {
  const modeState = getModeState();
  if (!modeState) return;
  const targetTab = modeState.tabs.find(tab => tab.id === tabId);
  if (!targetTab) return;
  const itemCount = getTabItems(targetTab).length;
  if (itemCount === 0) return;
  const ok = window.confirm(`Clear all ${itemCount} item(s) in "${targetTab.name}"?`);
  if (!ok) return;
  setTabItems(targetTab, []);
  if (modeState.activeTabId === tabId) {
    selectedSavedIds.clear();
    lastSelectedSavedId = null;
  }
  tabsMenuPanel.hidden = true;
  closeMoveToSubmenu();
  closeCopyToSubmenu();
  closeLoadDataSubmenu();
  tabsMenuBtn.setAttribute('aria-expanded', 'false');
  persistAppState();
  renderTabs();
  renderSavedItems();
}

        if (!imported) {
          showError('Invalid JSON format for import.');
          return;
        }
        const importedTabs = collectImportedTabsForMode(imported, appMode);
        const importMode = await askImportMode();
        if (importMode === 'cancel') {
          showError('Import canceled.');
          return;
        }
        if (importMode === 'newTab') {
          if (importedTabs.length === 0) {
            showError(`No ${appMode.toUpperCase()} tabs found in import file.`);
            return;
          }
          importTabsIntoNewTabs(importedTabs);
          return;
        }
        if (!confirmReplaceImport()) {
          showError('Import canceled.');
          return;
        }
        replaceAllTabsWithImportedTabs(importedTabs);
      } catch {
        showError('Failed to import JSON file.');
      }
    });

    function scheduleTranslate() {
      if (debounceId) clearTimeout(debounceId);
      debounceId = setTimeout(() => {
        translateInput();
      }, 500);
    }

    async function translateInput() {
      const input = sourceText.value.trim();
      if (!input) {
        requestCounter += 1;
        currentResult = null;
        zhText.textContent = '-';
        pinyinText.textContent = '-';
        katakanaText.textContent = '-';
        speakBtn.disabled = true;
        saveBtn.disabled = true;
        showError('');
        return;
      }

      const requestId = ++requestCounter;
      showError('');
      showBusy(true);

      try {
        const targetLang = appMode === 'zh'
          ? 'zh-CN'
          : (appMode === 'ko' ? 'ko' : 'ja');
        const translatedPack = await translateText(input, targetLang);
        let targetText = translatedPack.translated;
        if (
          appMode === 'zh' &&
          /[\u4E00-\u9FFF]/.test(input) &&
          /^[A-Za-z]$/.test(String(targetText || '').trim())
        ) {
          targetText = input;
        }
        if (requestId !== requestCounter) return;
        let reading = '';
        let kata = '';
        let speakLang = 'zh-CN';
        if (appMode === 'ja' || appMode === 'ja_ko') {
          speakLang = 'ja-JP';
          await ensureWanakanaLoaded();
          let kanaDisplay = await fetchJapaneseHiragana(targetText);
          if (!hasKana(kanaDisplay)) {
            const fromInput = await translateInputToJapaneseHiragana(input);
            if (hasKana(fromInput)) {
              kanaDisplay = fromInput;
            }
          }
          if (!hasKana(kanaDisplay)) {
            const rm = await fetchRomanizedJapanese(targetText);
            if (isRomajiLike(rm)) {
              const fromRm = toHiraganaSafe(toPlainRomaji(rm));
              if (hasKana(fromRm)) {
                kanaDisplay = fromRm;
              }
            }
          }
          if (!hasKana(kanaDisplay)) {
            const kuromojiKana = await getJapaneseReadingFromKuromoji(targetText);
            if (hasKana(kuromojiKana)) {
              kanaDisplay = kuromojiKana;
            }
          }
          let romaji = hasKana(kanaDisplay) ? buildJapaneseRomajiFromKana(kanaDisplay) : '';
          if (
            /[\u4E00-\u9FFF]/.test(targetText) &&
            (!romaji || romaji.replace(/\s+/g, '').length < 6)
          ) {
            const fullRomaji = await buildJapaneseRomaji(targetText, translatedPack.raw);
            if (isRomajiLike(fullRomaji)) {
              romaji = fullRomaji;
            }
          }
          reading = hasKana(kanaDisplay) ? kanaDisplay : '';
          kata = romaji;
        } else if (appMode === 'ko') {
          speakLang = 'ko-KR';
          reading = await fetchRomanizedKorean(targetText);
          kata = '';
        } else {
          if (window.pinyinPro && typeof window.pinyinPro.pinyin === 'function') {
            reading = window.pinyinPro.pinyin(targetText, {
              toneType: 'symbol',
              type: 'array',
              nonZh: 'consecutive'
            }).join(' ');
            kata = pinyinToKatakana(reading);
          } else {
            reading = '';
            kata = '';
          }
        }
        if (requestId !== requestCounter) return;

        currentResult = {
          mode: appMode,
          source: input,
          target: targetText,
          reading,
          katakana: kata,
          speakLang
        };

        zhText.textContent = targetText || '-';
        pinyinText.textContent = reading || '-';
        katakanaText.textContent = kata || '-';

        speakBtn.disabled = !targetText;
        saveBtn.disabled = !targetText;
      } catch (error) {
        if (requestId !== requestCounter) return;
        showError(error.message || 'Failed to translate.');
      } finally {
        if (requestId === requestCounter) {
          showBusy(false);
        }
      }
    }

    async function translateText(text, targetLang) {
      try {
        const endpoint = 'https://translate.googleapis.com/translate_a/single';
        const params = new URLSearchParams();
        params.set('client', 'gtx');
        params.set('sl', 'auto');
        params.set('tl', targetLang);
        params.append('dt', 't');
        if (targetLang === 'ja') {
          // Needed for Japanese mode reading extraction.
          params.append('dt', 'rm');
        }
        params.set('q', text);

        const res = await fetchWithTimeout(endpoint + '?' + params.toString(), 3500);
        if (!res.ok) throw new Error('Primary translation failed');

        const data = await res.json();
        if (!Array.isArray(data) || !Array.isArray(data[0])) {
          throw new Error('Unexpected primary translation response');
        }

        const translated = data[0]
          .map(chunk => Array.isArray(chunk) ? chunk[0] : '')
          .join('')
          .trim();

        if (!translated) throw new Error('No text in primary translation response');
        return { translated, raw: data };
      } catch {
        const fallback = 'https://api.mymemory.translated.net/get';
        const sourceCandidates = targetLang === 'ja'
          ? ['zh-CN', 'ko', 'en']
          : (targetLang === 'ko' ? ['ja', 'en', 'zh-CN'] : ['ja', 'en', 'zh-CN']);

        for (const sourceLang of sourceCandidates) {
          const fbParams = new URLSearchParams({
            q: text,
            langpair: `${sourceLang}|${targetLang}`
          });
          const fbRes = await fetchWithTimeout(fallback + '?' + fbParams.toString(), 3500);
          if (!fbRes.ok) continue;

          const fbData = await fbRes.json();
          const translated = fbData && fbData.responseData && fbData.responseData.translatedText
            ? String(fbData.responseData.translatedText).trim()
            : '';

          if (!translated) continue;
          const upper = translated.toUpperCase();
          const looksLikeError = upper.includes('INVALID SOURCE LANGUAGE')
            || upper.includes('LANGPAIR=')
            || upper.includes('USING 2 LETTER ISO');
          if (looksLikeError) continue;

          return { translated, raw: null };
        }

        throw new Error('Translation service returned an error.');
      }
    }

    async function buildJapaneseRomaji(targetText, rawTranslationData) {
      if (!targetText) return '';
      const fromRaw = extractRomanizedReading(rawTranslationData);
      if (isRomajiLike(fromRaw)) {
        return normalizeRomaji(fromRaw);
      }
      const deepRaw = extractRomanizedReadingDeep(rawTranslationData);
      if (isRomajiLike(deepRaw)) {
        return normalizeRomaji(deepRaw);
      }

      // Second pass: ask for romanization from Japanese text itself.
      try {
        const romanized = await fetchRomanizedJapanese(targetText);
        if (isRomajiLike(romanized)) return normalizeRomaji(romanized);
      } catch {
        // Ignore and fallback below.
      }

      const converter =
        (window.wanakana && typeof window.wanakana.toRomaji === 'function' && window.wanakana) ||
        (window.Wanakana && typeof window.Wanakana.toRomaji === 'function' && window.Wanakana) ||
        (window.WanaKana && typeof window.WanaKana.toRomaji === 'function' && window.WanaKana) ||
        (window.wanakana && window.wanakana.default && typeof window.wanakana.default.toRomaji === 'function' && window.wanakana.default);
      if (converter) {
        const romaji = converter.toRomaji(String(targetText || ''));
        if (isRomajiLike(romaji)) {
          return normalizeRomaji(romaji);
        }
      }

      return '';
    }

    function extractRomanizedReading(rawData) {
      if (!Array.isArray(rawData) || !Array.isArray(rawData[0])) return '';
      const parts = [];
      for (const chunk of rawData[0]) {
        if (!Array.isArray(chunk)) continue;
        const candidates = [chunk[3], chunk[2]];
        for (const c of candidates) {
          if (typeof c === 'string' && /[a-z]/i.test(c)) {
            parts.push(c);
            break;
          }
        }
      }
      return parts.join(' ').trim();
    }

    async function fetchRomanizedJapanese(japaneseText) {
      const endpoint = 'https://translate.googleapis.com/translate_a/single';
      const params = new URLSearchParams({
        client: 'gtx',
        sl: 'ja',
        tl: 'en',
        dt: 'rm',
        q: japaneseText
      });
      const res = await fetchWithTimeout(endpoint + '?' + params.toString(), 2500);
      if (!res.ok) return '';
      const data = await res.json();
      return extractRomanizedReading(data);
    }

    async function fetchRomanizedKorean(koreanText) {
      if (!koreanText) return '';
      const endpoint = 'https://translate.googleapis.com/translate_a/single';
      const params = new URLSearchParams({
        client: 'gtx',
        sl: 'ko',
        tl: 'en',
        dt: 'rm',
        q: koreanText
      });
      const res = await fetchWithTimeout(endpoint + '?' + params.toString(), 2500);
      if (!res.ok) return '';
      const data = await res.json();
      const rm = extractRomanizedReading(data);
      if (isRomajiLike(rm)) return normalizeRomaji(rm);
      return '';
    }

    async function fetchJapaneseHiragana(japaneseText) {
      if (!japaneseText) return '';
      const endpoint = 'https://translate.googleapis.com/translate_a/single';
      const targets = ['ja-Hira', 'ja-Hrkt'];
      for (const tl of targets) {
        const params = new URLSearchParams();
        params.set('client', 'gtx');
        params.set('sl', 'ja');
        params.set('tl', tl);
        params.append('dt', 't');
        params.set('q', japaneseText);
        const res = await fetchWithTimeout(endpoint + '?' + params.toString(), 2500);
        if (!res.ok) continue;
        const data = await res.json();
        if (!Array.isArray(data) || !Array.isArray(data[0])) continue;
        const translated = data[0]
          .map(chunk => Array.isArray(chunk) ? chunk[0] : '')
          .join('')
          .trim();
        if (translated) {
          const hiraFromTranslated = toHiraganaSafe(translated);
          if (hasKana(hiraFromTranslated) && !/[\u4E00-\u9FFF]/.test(hiraFromTranslated)) {
            return hiraFromTranslated;
          }
        }
      }
      return '';
    }

    async function getJapaneseReadingFromKuromoji(japaneseText) {
      // Disabled to avoid ORB/CSP issues from external tokenizer script loading.
      void japaneseText;
      return '';
    }


    async function translateInputToJapaneseHiragana(sourceTextValue) {
      if (!sourceTextValue) return '';
      const endpoint = 'https://translate.googleapis.com/translate_a/single';
      const params = new URLSearchParams({
        client: 'gtx',
        sl: 'auto',
        tl: 'ja-Hira',
        dt: 't',
        q: sourceTextValue
      });
      const res = await fetchWithTimeout(endpoint + '?' + params.toString(), 2500);
      if (!res.ok) return '';
      const data = await res.json();
      if (!Array.isArray(data) || !Array.isArray(data[0])) return '';
      const translated = data[0]
        .map(chunk => Array.isArray(chunk) ? chunk[0] : '')
        .join('')
        .trim();
      if (!hasKana(translated)) return '';
      const hira = toHiraganaSafe(translated);
      if (/[\u4E00-\u9FFF]/.test(hira)) return '';
      return hira;
    }

    function extractRomanizedReadingDeep(rawData) {
      const candidates = [];
      const walk = (value) => {
        if (typeof value === 'string') {
          const t = value.trim();
          if (isRomajiLike(t)) candidates.push(t);
          return;
        }
        if (Array.isArray(value)) {
          for (const v of value) walk(v);
          return;
        }
        if (value && typeof value === 'object') {
          for (const v of Object.values(value)) walk(v);
        }
      };
      walk(rawData);
      candidates.sort((a, b) => b.length - a.length);
      return candidates[0] || '';
    }

    function toHiraganaSafe(value) {
      const converter =
        (window.wanakana && typeof window.wanakana.toHiragana === 'function' && window.wanakana) ||
        (window.Wanakana && typeof window.Wanakana.toHiragana === 'function' && window.Wanakana) ||
        (window.WanaKana && typeof window.WanaKana.toHiragana === 'function' && window.WanaKana) ||
        (window.wanakana && window.wanakana.default && typeof window.wanakana.default.toHiragana === 'function' && window.wanakana.default);
      const text = String(value || '');
      if (converter) return converter.toHiragana(text);
      const fromKana = katakanaToHiraganaFallback(text);
      if (/[ぁ-ん]/.test(fromKana)) return fromKana;
      if (/[a-z]/i.test(fromKana)) return romajiToHiraganaFallback(fromKana);
      return fromKana;
    }

    function toKatakanaFromRomaji(romajiText, japaneseText) {
      const converter =
        (window.wanakana && typeof window.wanakana.toKatakana === 'function' && window.wanakana) ||
        (window.Wanakana && typeof window.Wanakana.toKatakana === 'function' && window.Wanakana) ||
        (window.WanaKana && typeof window.WanaKana.toKatakana === 'function' && window.WanaKana) ||
        (window.wanakana && window.wanakana.default && typeof window.wanakana.default.toKatakana === 'function' && window.wanakana.default);
      if (!converter) return String(romajiText || japaneseText || '');
      if (/[a-z]/i.test(String(romajiText || ''))) {
        // wanakana expects plain romaji for best results
        const plain = toPlainRomaji(romajiText);
        return converter.toKatakana(plain);
      }
      return converter.toKatakana(toHiraganaSafe(String(japaneseText || '')));
    }

    function toRomajiSafe(value) {
      const converter =
        (window.wanakana && typeof window.wanakana.toRomaji === 'function' && window.wanakana) ||
        (window.Wanakana && typeof window.Wanakana.toRomaji === 'function' && window.Wanakana) ||
        (window.WanaKana && typeof window.WanaKana.toRomaji === 'function' && window.WanaKana) ||
        (window.wanakana && window.wanakana.default && typeof window.wanakana.default.toRomaji === 'function' && window.wanakana.default);
      const text = String(value || '');
      const out = converter ? converter.toRomaji(text) : kanaToRomajiFallback(text);
      return isRomajiLike(out) ? normalizeRomaji(out) : '';
    }

    function katakanaToHiraganaFallback(text) {
      return String(text || '').replace(/[ァ-ヶ]/g, (char) => {
        const code = char.charCodeAt(0);
        return String.fromCharCode(code - 0x60);
      });
    }

    function romajiToHiraganaFallback(input) {
      let s = toPlainRomaji(input)
        .toLowerCase()
        .replace(/[^a-z'\s-]/g, '')
        .replace(/\s+/g, ' ')
        .trim();
      if (!s) return '';

      const tri = {
        kya: 'きゃ', kyu: 'きゅ', kyo: 'きょ',
        gya: 'ぎゃ', gyu: 'ぎゅ', gyo: 'ぎょ',
        sha: 'しゃ', shu: 'しゅ', sho: 'しょ',
        ja: 'じゃ', ju: 'じゅ', jo: 'じょ',
        cha: 'ちゃ', chu: 'ちゅ', cho: 'ちょ',
        nya: 'にゃ', nyu: 'にゅ', nyo: 'にょ',
        hya: 'ひゃ', hyu: 'ひゅ', hyo: 'ひょ',
        bya: 'びゃ', byu: 'びゅ', byo: 'びょ',
        pya: 'ぴゃ', pyu: 'ぴゅ', pyo: 'ぴょ',
        mya: 'みゃ', myu: 'みゅ', myo: 'みょ',
        rya: 'りゃ', ryu: 'りゅ', ryo: 'りょ'
      };
      const bi = {
        ts: 'つ',
        sh: 'し',
        ch: 'ち',
        ky: 'き',
        gy: 'ぎ',
        ny: 'に',
        hy: 'ひ',
        by: 'び',
        py: 'ぴ',
        my: 'み',
        ry: 'り'
      };
      const mono = {
        a: 'あ', i: 'い', u: 'う', e: 'え', o: 'お',
        k: 'く', g: 'ぐ', s: 'す', z: 'ず', j: 'じ', t: 'と', d: 'ど',
        n: 'ん', h: 'ふ', b: 'ぶ', p: 'ぷ', m: 'む', y: 'い', r: 'る', w: 'う',
        ka: 'か', ki: 'き', ku: 'く', ke: 'け', ko: 'こ',
        ga: 'が', gi: 'ぎ', gu: 'ぐ', ge: 'げ', go: 'ご',
        sa: 'さ', si: 'し', shi: 'し', su: 'す', se: 'せ', so: 'そ',
        za: 'ざ', zi: 'じ', ji: 'じ', zu: 'ず', ze: 'ぜ', zo: 'ぞ',
        ta: 'た', ti: 'てぃ', chi: 'ち', tu: 'とぅ', tsu: 'つ', te: 'て', to: 'と',
        da: 'だ', di: 'でぃ', du: 'どぅ', de: 'で', do: 'ど',
        na: 'な', ni: 'に', nu: 'ぬ', ne: 'ね', no: 'の',
        ha: 'は', hi: 'ひ', hu: 'ふ', fu: 'ふ', he: 'へ', ho: 'ほ',
        ba: 'ば', bi: 'び', bu: 'ぶ', be: 'べ', bo: 'ぼ',
        pa: 'ぱ', pi: 'ぴ', pu: 'ぷ', pe: 'ぺ', po: 'ぽ',
        ma: 'ま', mi: 'み', mu: 'む', me: 'め', mo: 'も',
        ya: 'や', yu: 'ゆ', yo: 'よ',
        ra: 'ら', ri: 'り', ru: 'る', re: 'れ', ro: 'ろ',
        wa: 'わ', wo: 'を',
        n: 'ん'
      };

      let out = '';
      let i = 0;
      while (i < s.length) {
        const c = s[i];
        if (c === ' ' || c === '-') {
          out += c === ' ' ? ' ' : '';
          i += 1;
          continue;
        }
        if (c === '\'') {
          i += 1;
          continue;
        }

        const next = s[i + 1] || '';
        if (
          i + 1 < s.length &&
          c === next &&
          /[bcdfghjklmpqrstvwxyz]/.test(c) &&
          c !== 'n'
        ) {
          out += 'っ';
          i += 1;
          continue;
        }

        const t3 = s.slice(i, i + 3);
        const t2 = s.slice(i, i + 2);
        const t1 = s.slice(i, i + 1);

        if (tri[t3]) {
          out += tri[t3];
          i += 3;
          continue;
        }
        if (mono[t3]) {
          out += mono[t3];
          i += 3;
          continue;
        }
        if (mono[t2]) {
          out += mono[t2];
          i += 2;
          continue;
        }
        if (t1 === 'n') {
          const after = s[i + 1] || '';
          if (!after || /[^aeiouy]/.test(after)) {
            out += 'ん';
            i += 1;
            continue;
          }
        }
        if (bi[t2] && /[aeiou]/.test(s[i + 2] || '')) {
          out += bi[t2];
          i += 2;
          continue;
        }
        if (mono[t1]) {
          out += mono[t1];
          i += 1;
          continue;
        }
        i += 1;
      }
      return out.trim();
    }

    function kanaToRomajiFallback(value) {
      const text = katakanaToHiraganaFallback(String(value || ''));
      if (!text) return '';
      const digraph = {
        'きゃ': 'kya', 'きゅ': 'kyu', 'きょ': 'kyo',
        'ぎゃ': 'gya', 'ぎゅ': 'gyu', 'ぎょ': 'gyo',
        'しゃ': 'sha', 'しゅ': 'shu', 'しょ': 'sho',
        'じゃ': 'ja', 'じゅ': 'ju', 'じょ': 'jo',
        'ちゃ': 'cha', 'ちゅ': 'chu', 'ちょ': 'cho',
        'にゃ': 'nya', 'にゅ': 'nyu', 'にょ': 'nyo',
        'ひゃ': 'hya', 'ひゅ': 'hyu', 'ひょ': 'hyo',
        'びゃ': 'bya', 'びゅ': 'byu', 'びょ': 'byo',
        'ぴゃ': 'pya', 'ぴゅ': 'pyu', 'ぴょ': 'pyo',
        'みゃ': 'mya', 'みゅ': 'myu', 'みょ': 'myo',
        'りゃ': 'rya', 'りゅ': 'ryu', 'りょ': 'ryo',
        'てぃ': 'ti', 'でぃ': 'di', 'とぅ': 'tu', 'どぅ': 'du'
      };
      const mono = {
        'あ': 'a', 'い': 'i', 'う': 'u', 'え': 'e', 'お': 'o',
        'か': 'ka', 'き': 'ki', 'く': 'ku', 'け': 'ke', 'こ': 'ko',
        'が': 'ga', 'ぎ': 'gi', 'ぐ': 'gu', 'げ': 'ge', 'ご': 'go',
        'さ': 'sa', 'し': 'shi', 'す': 'su', 'せ': 'se', 'そ': 'so',
        'ざ': 'za', 'じ': 'ji', 'ず': 'zu', 'ぜ': 'ze', 'ぞ': 'zo',
        'た': 'ta', 'ち': 'chi', 'つ': 'tsu', 'て': 'te', 'と': 'to',
        'だ': 'da', 'ぢ': 'ji', 'づ': 'zu', 'で': 'de', 'ど': 'do',
        'な': 'na', 'に': 'ni', 'ぬ': 'nu', 'ね': 'ne', 'の': 'no',
        'は': 'ha', 'ひ': 'hi', 'ふ': 'fu', 'へ': 'he', 'ほ': 'ho',
        'ば': 'ba', 'び': 'bi', 'ぶ': 'bu', 'べ': 'be', 'ぼ': 'bo',
        'ぱ': 'pa', 'ぴ': 'pi', 'ぷ': 'pu', 'ぺ': 'pe', 'ぽ': 'po',
        'ま': 'ma', 'み': 'mi', 'む': 'mu', 'め': 'me', 'も': 'mo',
        'や': 'ya', 'ゆ': 'yu', 'よ': 'yo',
        'ら': 'ra', 'り': 'ri', 'る': 'ru', 'れ': 're', 'ろ': 'ro',
        'わ': 'wa', 'を': 'o', 'ん': 'n',
        'ゔ': 'vu',
        'ぁ': 'a', 'ぃ': 'i', 'ぅ': 'u', 'ぇ': 'e', 'ぉ': 'o'
      };
      let out = '';
      let i = 0;
      let geminate = false;
      while (i < text.length) {
        const c = text[i];
        if (c === 'っ') {
          geminate = true;
          i += 1;
          continue;
        }
        if (c === 'ー') {
          const m = out.match(/[aeiou]$/);
          if (m) out += m[0];
          i += 1;
          continue;
        }
        const pair = text.slice(i, i + 2);
        let roma = '';
        if (digraph[pair]) {
          roma = digraph[pair];
          i += 2;
        } else if (mono[c]) {
          roma = mono[c];
          i += 1;
        } else {
          i += 1;
          continue;
        }
        if (geminate && roma) {
          roma = roma[0] + roma;
          geminate = false;
        }
        out += roma;
      }
      return out.trim();
    }

    function toPlainRomaji(value) {
      return String(value || '')
        .toLowerCase()
        .replace(/ā/g, 'aa')
        .replace(/ī/g, 'ii')
        .replace(/ū/g, 'uu')
        .replace(/ē/g, 'ee')
        .replace(/ō/g, 'ou');
    }

    function buildJapaneseKanaDisplay(japaneseText, hiraHint) {
      const text = String(japaneseText || '');
      const hasKatakana = /[\u30A0-\u30FF]/.test(text);
      const hasHiragana = /[\u3040-\u309F]/.test(text);
      const hasKanji = /[\u4E00-\u9FFF]/.test(text);

      if (hasKatakana && !hasHiragana) {
        return toKatakanaFromRomaji('', text) || text;
      }
      if (hasHiragana && !hasKanji) {
        return toHiraganaSafe(text) || text;
      }

      if (hiraHint && /[\u3040-\u309F]/.test(hiraHint)) {
        return hiraHint;
      }

      if (hasKatakana) return toKatakanaFromRomaji('', text) || text;
      if (hasHiragana) return toHiraganaSafe(text) || text;
      return text;
    }

    function buildJapaneseRomajiFromKana(kanaDisplay) {

    function isRomajiLike(value) {
      const t = String(value || '').trim();

      if (upper.includes('INVALID SOURCE LANGUAGE') || upper.includes('LANGPAIR=')) return false;
      return /[a-z]/i.test(t);

      const text = String(value || '')
        .trim()
        .toLowerCase()
        .replace(/\s+/g, ' ');

      return text
        .replace(/aa/g, 'ā')
        .replace(/ii/g, 'ī')
        .replace(/uu/g, 'ū')
        .replace(/ee/g, 'ē')
        .replace(/ou/g, 'ō')

    const PINYIN_KATAKANA_MAP = buildPinyinKatakanaMap();
    const KATAKANA_TUNING = {
      di: 'ディ',
      ti: 'ティ',
      ji: 'ジ',
      qi: 'チ',
      xi: 'シ',
      ri: 'リ',
      zi: 'ズ',
      ci: 'ツ',
      si: 'ス'
